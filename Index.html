<body class="font-sans text-gray-800 antialiased overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    // --- Persistent Mock DB สำหรับการทดสอบบน Canvas ---
    if (!window.sasMockDB) {
      window.sasMockDB = [
         { id: 'JOB-BKK-001', site: 'โครงการ Q House', owner: 'คุณสมชาย', ownerCompany: 'Q House PCL', staff: 'ณภัทร', status: 'Active', remark: 'เร่งด่วน', replyDueDate: '2026-03-31', tasks: [
           { id: 'BKK-T001', scope: 'SAS', building: 'Tower A', unit: 'A101', status: 'Active', customerName: 'คุณลูกค้า A', targetFixDate: '2026-04-15', defects: [
             { id: 'DEF-001', mainCategory: 'งานผนัง', subCategory: 'งานสีรองพื้น', description: 'สีผนังห้องรับแขกลอกเป็นแผ่น และมีรอยแตกร้าวบริเวณมุมห้อง', major: 'ไม่ใช่', team: 'ทีมช่างสี', status: 'รอดำเนินการ', targetStartDate: '2026-04-01', targetEndDate: '2026-04-15' },
             { id: 'DEF-002', mainCategory: 'งานระบบไฟฟ้า', subCategory: 'ไฟไม่ติด', description: 'หลอดไฟระเบียงไม่สามารถเปิดใช้งานได้', major: 'ใช่', team: 'ทีมช่างไฟ (Internal)', status: 'แก้ไขแล้ว', targetStartDate: '2026-04-02', targetEndDate: '2026-04-16' },
             { id: 'DEF-003', mainCategory: 'งานผนัง', subCategory: 'ก่ออิฐ/ฉาบปูน', description: 'พังหมดแล้วแก้ด่วนๆ', major: 'ใช่', team: 'ทีมช่างสี (Internal)', status: 'แก้ไขแล้ว', targetStartDate: '2026-04-05', targetEndDate: '2026-04-19' }
           ]}
         ]},
         { id: 'JOB-CNX-002', site: 'โครงการ Sansiri', owner: 'คุณสมหญิง', ownerCompany: 'Sansiri PCL', staff: 'ณเดช', status: 'รอดำเนินการ', remark: '', tasks: []}
      ];
    }

    if (typeof google === 'undefined') {
      window.google = {
        script: {
          run: new Proxy({}, {
            get: function(_, prop) {
              const handler = {
                success: null, failure: null,
                withSuccessHandler: function(cb) { this.success = cb; return new Proxy(this, proxyHandler); },
                withFailureHandler: function(cb) { this.failure = cb; return new Proxy(this, proxyHandler); }
              };
              const proxyHandler = {
                get: function(t, p) {
                  if (p in t) return typeof t[p] === 'function' ? t[p].bind(t) : t[p];
                  return function(...args) {
                    setTimeout(() => {
                      if (t.success) {
                        if (p === 'getAllData' || p === 'getAllDataForUser') {
                           t.success(JSON.stringify(window.sasMockDB));
                        }
                        else if (p === 'getMasterData') t.success(JSON.stringify({
                            sites: ['โครงการ Q House', 'โครงการ Sansiri'], 
                            owners: [{site: 'โครงการ Q House', owner: 'คุณสมชาย', ownerCompany: 'Q House PCL'}],
                            mainCategories: ['งานผนัง', 'งานฝ้าเพดาน', 'งานระบบไฟฟ้า', 'งานระบบประปา'],
                            subCategories: {
                              'งานผนัง': ['ก่ออิฐ/ฉาบปูน', 'งานสีรองพื้น', 'ผนังสำเร็จรูป'],
                              'งานฝ้าเพดาน': ['โครงคร่าว'],
                              'งานระบบไฟฟ้า': ['ตู้ Control', 'ท่อร้อยสาย', 'บล๊อคไฟ/Pool box', 'รางWireWay', 'สาย (G)', 'สาย (L)', 'สาย (N)'],
                              'งานระบบประปา': ['ท่อรั่ว', 'ก๊อกน้ำซึม']
                            },
                            teams: ['ทีมช่างสี (Internal)', 'ทีมช่างไฟ (Internal)', 'Supplier A (โครงสร้าง)', 'Supplier B (ประปา)'] // Mockup Data ทีมเข้าแก้ไข
                        }));
                        else if (p === 'loginUser') t.success({userId: args[0], fullName: 'ผู้ใช้งานระบบ (Mock)', role: 'ADMIN', isAdmin: true});
                        else if (p === 'getUsersForManagement') {
                           t.success(JSON.stringify([
                             { userId: 'test_user1', fullName: 'สมปอง ทดสอบ', email: 'sompong@test.com', phone: '0812345678', position: 'Supplier', role: 'PENDING', approved: false, isAdmin: false, isStaff: false, isSupplier: false, team: '' },
                             { userId: 'admin_1', fullName: 'ผู้ดูแลระบบ', email: 'admin@test.com', phone: '0899999999', position: 'SAS Staff', role: 'ADMIN', approved: true, isAdmin: true, isStaff: false, isSupplier: false, team: '' }
                           ]));
                        }
                        else if (p === 'exportTaskPlansToPDF') {
                           const selectedTaskIds = Array.isArray(args[1]) ? args[1].filter(Boolean) : (args[1] ? [args[1]] : []);
                           const mockTaskIds = selectedTaskIds.length > 0 ? selectedTaskIds : ['MOCK-TASK-001', 'MOCK-TASK-002'];
                           t.success(JSON.stringify(mockTaskIds.map(taskId => ({taskId, name: `RepairPlan_${taskId}.pdf`, url: '#'}))));
                        }
                        else if (p === 'exportDefectReportToPDF') {
                           t.success(JSON.stringify({taskId: 'MOCK-DOC', url: '#'}));
                        }
                        else if (p === 'updateTaskStatusAndJob') {
                           let taskId = args[0];
                           let newStatus = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.status = newStatus;
                                 let allClosed = job.tasks.length > 0 && job.tasks.every(tk => tk.status === 'Closed');
                                 if (allClosed) job.status = 'Closed';
                                 else if (newStatus === 'Active' || job.status === 'Closed') job.status = 'Active';
                              }
                           });
                           t.success("Success");
                        }
                        else if (p === 'addDefect') {
                           let taskId = args[0];
                           let formData = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.defects = task.defects || [];
                                 task.defects.push({ id: `DEF-NEW-${Date.now()}`, ...formData, status: 'รอดำเนินการ' });
                              }
                           });
                           t.success("DEF-NEW");
                        }
                        else if (p === 'deleteDefect') {
                           window.sasMockDB.forEach(job => {
                              job.tasks.forEach(task => {
                                 if (task.defects) task.defects = task.defects.filter(d => d.id !== args[0]);
                              });
                           });
                           t.success("Success");
                        }
                        else if (p === 'updateManagedUser') {
                           let payload = args[1];
                           let updated = { ...payload, approved: payload.approved, role: payload.roleValue };
                           t.success(JSON.stringify(updated));
                        }
                        else if (p === 'getCurrentUserProfile' || p === 'updateUserProfile') {
                           let userObj = JSON.parse(sessionStorage.getItem('sas_user')) || {userId: args[0], fullName: 'ผู้ใช้งานระบบ (Mock)', role: 'ADMIN', isAdmin: true};
                           if (p === 'updateUserProfile') {
                               userObj = { ...userObj, ...args[1] };
                           }
                           t.success(userObj);
                        }
                        else {
                           t.success("Mock-Success");
                        }
                      }
                    }, 400);
                  };
                }
              };
              if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') return handler[prop].bind(handler);
              return proxyHandler.get(handler, prop);
            }
          })
        }
      };
    }

    const { useState, useEffect, useRef } = React;

    // --- Data Options ---
    const STAFFS = ['ณภัทร ปรีชาวุฒิวงศ์', 'ณเดช คูกิมิยะ', 'USER_CURRENT'];
    const USER_ROLE_OPTIONS = ['SAS Staff', 'Supplier'];
    const USER_POSITION_OPTIONS = ['Admin', 'Staff', 'Supplier'];
    const ROLE_LABELS = { ADMIN: 'Admin', STAFF: 'Staff', SUPPLIER: 'Supplier', PENDING: 'Pending Approval' };

    // --- Icons (Phosphor/Lucide style via inline SVG) ---
    const Icons = {
      Menu: ({ className = "w-6 h-6" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
      Logo: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
      Grid: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>,
      Calendar: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      File: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>,
      Building: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="22"/><line x1="15" y1="22" x2="15" y2="22"/><line x1="9" y1="6" x2="9" y2="6"/><line x1="15" y1="6" x2="15" y2="6"/><line x1="9" y1="10" x2="9" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="9" y2="14"/><line x1="15" y1="14" x2="15" y2="14"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Bell: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      ChevronLeft: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronRight: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="9 18 15 12 9 6"/></svg>,

      DotsThree: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
      Trash: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
      Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0-2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
      Edit: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>,
      Eye: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
      Move: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 9l-3 3 3 3"></path><path d="M9 5l3-3 3 3"></path><path d="M15 19l-3 3-3-3"></path><path d="M19 9l3 3-3 3"></path><path d="M2 12h20"></path><path d="M12 2v20"></path></svg>,
      Minus: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
      Square: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2"></rect></svg>,
      Circle: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="8"></circle></svg>,
      Type: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>,
      Undo: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-15-6.7L3 13"></path></svg>,
      CheckCircle: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
      Download: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
      User: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
      Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
      Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
      Mail: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>,
      Phone: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,

      Home: ({ className }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      AlertCircle: ({ className }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    };

    // --- Helper Components ---
    const Avatar = ({ name, size = "sm" }) => {
      const initials = name ? name.substring(0, 2).toUpperCase() : 'U';
      const sizes = { sm: "w-8 h-8 text-xs", md: "w-10 h-10 text-sm" };
      return (
        <div className={`rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white flex items-center justify-center font-bold border-2 border-white shadow-sm ${sizes[size]}`}>
          {initials}
        </div>
      );
    };

    const StatusBadge = ({ status, size = 'sm' }) => {
      let colorClass = 'bg-gray-500 shadow-gray-500/40'; // Default
      
      if (status === 'Active') {
        colorClass = 'bg-blue-500 shadow-blue-500/40';
      } else if (status === 'Closed' || status === 'แก้ไขแล้ว' || status === 'เสร็จสิ้น') {
        // อิงสีตามรูปภาพตัวอย่าง
        colorClass = 'bg-[#10b981] shadow-emerald-500/30';
      } else if (status === 'รอดำเนินการ' || status === 'ยังไม่แก้ไข') {
