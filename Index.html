                      <div className="rounded-2xl bg-slate-50 border border-slate-100 px-4 py-3">
                        <div className="text-sm font-bold text-slate-900">Staff</div>
                        <div className="text-sm text-slate-500 mt-1">ทำงานตามสิทธิ์บน Web-app ได้ครบ แต่ไม่เข้าถึง User Management</div>
                      </div>
                      <div className="rounded-2xl bg-cyan-50 border border-cyan-100 px-4 py-3">
                        <div className="text-sm font-bold text-cyan-900">Supplier</div>
                        <div className="text-sm text-cyan-700 mt-1">ดู defect ของทีมตัวเองและเพิ่ม/บันทึกรูปภาพได้เท่านั้น</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // Main Render Return
      if (!currentUser) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 hero-pattern overflow-y-auto">
             <div className="absolute inset-0 hero-overlay"></div>
             
             <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 max-w-lg w-full relative z-10 border border-white/20 my-6 max-h-[calc(100vh-3rem)] overflow-y-auto">
                <div className="text-center mb-8">
                   <div className="w-16 h-16 bg-gradient-to-br from-brand-500 to-brand-700 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-brand-200/50">
                      <Icons.Logo />
                   </div>
                   <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">SAS Defect Management</h1>
                   <p className="text-gray-500 mt-2 font-medium">เข้าสู่ระบบเพื่อจัดการงานของคุณ</p>
                </div>

                {authError && (
                  <div className="bg-rose-50 text-rose-600 p-4 rounded-xl text-sm font-semibold mb-6 flex items-start gap-3 border border-rose-100">
                    <Icons.AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                    <span>{authError}</span>
                  </div>
                )}

                <form onSubmit={handleAuthSubmit} className="space-y-4">
                   {authMode === 'REGISTER' && (
                     <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-300 max-h-[52vh] overflow-y-auto pr-1">
                       <div className="rounded-2xl border border-brand-100 bg-gradient-to-br from-brand-50 to-white p-4 space-y-4">
                         <div className="flex items-start gap-3">
                           <div className="w-10 h-10 rounded-2xl bg-brand-600 text-white flex items-center justify-center shadow-sm shrink-0">
                             <Icons.User className="w-5 h-5" />
                           </div>
                           <div>
                             <div className="text-sm font-extrabold text-gray-900">Create your account</div>
                             <div className="text-xs text-gray-500 mt-1">กรอกข้อมูลที่จำเป็นก่อน แล้วเพิ่มข้อมูลติดต่อได้ตามต้องการ</div>
                           </div>
                         </div>

                         <div className="grid grid-cols-1 gap-4">
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.User className="w-4 h-4" /> User ID *</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.User className="w-4 h-4" /></span>
                               <input type="text" value={authForm.userId} onChange={e => setAuthForm({...authForm, userId: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="Enter your User ID" required />
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.User className="w-4 h-4" /> ชื่อ - นามสกุล *</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.User className="w-4 h-4" /></span>
                               <input type="text" value={authForm.fullName} onChange={e => setAuthForm({...authForm, fullName: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="John Doe" required />
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Briefcase className="w-4 h-4" /> เลือกบทบาท (Role) *</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><Icons.Briefcase className="w-4 h-4" /></span>
                               <select value={authForm.roleValue} onChange={e => setAuthForm({...authForm, roleValue: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all appearance-none" required>
                                 <option value="" disabled>-- กรุณาเลือกบทบาท --</option>
                                 {USER_ROLE_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
                               </select>
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Lock className="w-4 h-4" /> Password *</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Lock className="w-4 h-4" /></span>
                               <input type="password" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="••••••••" required />
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Lock className="w-4 h-4" /> Confirm Password *</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Lock className="w-4 h-4" /></span>
                               <input type="password" value={authForm.confirmPassword} onChange={e => setAuthForm({...authForm, confirmPassword: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="••••••••" required />
                             </div>
                           </div>
                         </div>
                       </div>

                       <div className="rounded-2xl border border-gray-200 bg-white p-4 space-y-4">
                         <div>
                           <div className="text-sm font-bold text-gray-900">ข้อมูลติดต่อเพิ่มเติม</div>
                           <div className="text-xs text-gray-500 mt-1">Email, Line และ Phone เป็นฟิลด์เสริม ไม่บังคับกรอก</div>
                         </div>
                         <div className="grid grid-cols-1 gap-4">
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Mail className="w-4 h-4" /> Email</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Mail className="w-4 h-4" /></span>
                               <input type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="you@example.com" />
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.User className="w-4 h-4" /> Line</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.User className="w-4 h-4" /></span>
                               <input type="text" value={authForm.line} onChange={e => setAuthForm({...authForm, line: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="Line ID" />
                             </div>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Phone className="w-4 h-4" /> Phone</label>
                             <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Phone className="w-4 h-4" /></span>
                               <input type="text" value={authForm.phone} onChange={e => setAuthForm({...authForm, phone: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="08x-xxx-xxxx" />
                             </div>
                           </div>
                         </div>
                       </div>
                     </div>
                   )}
                   {authMode === 'LOGIN' && (
                     <React.Fragment>
                       <div>
                         <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.User className="w-4 h-4" /> User ID *</label>
                         <div className="relative">
                           <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><Icons.User className="w-4 h-4" /></span>
                           <input type="text" value={authForm.userId} onChange={e => setAuthForm({...authForm, userId: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl pl-11 pr-3 py-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="Enter your User ID" required />
                         </div>
                       </div>
                       <div>
                         <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 flex items-center gap-2"><Icons.Lock className="w-4 h-4" /> Password *</label>
                         <input type="password" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="w-full bg-white border border-gray-200 rounded-xl p-3.5 text-sm outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-50 transition-all" placeholder="••••••••" required />
                       </div>
                     </React.Fragment>
                   )}
                   <button type="submit" disabled={authLoading} className="w-full bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white rounded-xl py-4 text-sm font-bold shadow-lg shadow-brand-200 hover:-translate-y-0.5 transition-all disabled:opacity-70 disabled:hover:translate-y-0 mt-6 flex items-center justify-center">
                      {authLoading ? (
                        <React.Fragment>
                          <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" className="opacity-25"></circle>
                            <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" className="opacity-75"></path>
                          </svg>
                          กำลังดำเนินการ...
                        </React.Fragment>
                      ) : (authMode === 'LOGIN' ? 'เข้าสู่ระบบ (Log In)' : 'ลงทะเบียน (Sign Up)')}
                   </button>
                </form>

                <div className="mt-8 text-center border-t border-gray-100 pt-6">
                   <button onClick={() => { setAuthMode(authMode === 'LOGIN' ? 'REGISTER' : 'LOGIN'); setAuthError(''); }} className="text-sm font-bold text-brand-600 hover:text-brand-800 transition-colors">
                      {authMode === 'LOGIN' ? 'ยังไม่มีบัญชี? ลงทะเบียนใหม่' : 'มีบัญชีอยู่แล้ว? เข้าสู่ระบบเลย'}
                   </button>
                </div>
             </div>
          </div>
        );
      }

      if (isLoading) {
         return <FullScreenLoader message="กำลังดาวน์โหลดข้อมูล..." />;
      }

      return (
        <div className="flex h-screen bg-gray-50/50 overflow-hidden font-sans">
           <Sidebar onLogout={handleLogout} isOpen={isSidebarOpen} onToggle={toggleSidebar} />
           <div className="flex-1 flex flex-col h-full w-full relative min-w-0">
              <TopHeader onRefresh={handleRefreshData} isRefreshing={isRefreshing} view={view} onToggleSidebar={toggleSidebar} />
              <main id="main-scroll-area" className="flex-1 overflow-y-auto w-full relative no-scrollbar">
                 {view === 'DASHBOARD' && <DashboardView />}
                 {view === 'SETTINGS' && canAccessSettings && <SettingsView />}
                 {view === 'USER_MANAGEMENT' && <UserManagementView />}
                 {!isAdmin && view === 'PROFILE_SETTINGS' && <ProfileSettingsView />}
                 {view === 'SUPPLIER_DEFECTS' && <SupplierDefectsView />}
                 {view === 'JOB_LIST' && <JobList />}
                 {view === 'JOB_DETAIL' && <JobDetail />}
                 {view === 'TASK_DETAIL' && <TaskDetail />}
                 {view === 'DEFECT_DETAIL' && <DefectDetail />}
              </main>
           </div>
           
           {/* Global Modals */}
           {showJobForm && <JobModal />}
           {showTaskForm && <TaskModal />}
           {showDefectForm && <DefectModal />}
           {isTaskPlanSelectorOpen && (
             <div className="fixed inset-0 z-[75] bg-slate-950/50 backdrop-blur-sm flex items-center justify-center p-4">
               <div className="w-full max-w-2xl rounded-[28px] bg-white border border-gray-100 shadow-2xl overflow-hidden">
                 <div className="px-5 md:px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-brand-50 to-white">
                   <div className="flex items-start justify-between gap-4">
                     <div>
                       <div className="text-xs font-bold uppercase tracking-[0.18em] text-brand-500">Select Pending Plans</div>
                       <div className="text-xl font-extrabold text-gray-900 mt-1">เลือกใบงานย่อยที่ต้องการ Export</div>
                       <div className="text-sm text-gray-500 mt-1">ระบบจะแสดงเฉพาะใบงานย่อยสถานะรอดำเนินการเท่านั้น</div>
                      </div>
                      <button onClick={() => setIsTaskPlanSelectorOpen(false)} className="w-10 h-10 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors"><Icons.X /></button>
                    </div>
                  </div>
                  <div className="p-5 md:p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 rounded-2xl border border-gray-100 bg-gray-50/80 px-4 py-4">
                      <div>
                        <div className="text-sm font-bold text-gray-900">รายการใบงานย่อยพร้อม Export</div>
                        <div className="text-xs text-gray-500 mt-1">เลือกได้เฉพาะรายการที่มีสถานะรอดำเนินการ</div>
                      </div>
                      <button onClick={handleToggleAllPendingTaskPlanCandidates} className="inline-flex items-center justify-center rounded-2xl border border-brand-200 bg-white px-4 py-2.5 text-sm font-bold text-brand-700 hover:bg-brand-50 transition-colors">
                        {areAllPendingTaskPlanCandidatesSelected ? 'ล้างการเลือกทั้งหมด' : 'เลือกทั้งหมด'}
                      </button>
                    </div>
                    <div className="space-y-3">
                      {pendingTaskPlanCandidates.map(task => {
                        const isChecked = selectedTaskPlanIds.includes(task.id);
                        const formattedDate = task.targetFixDate
                          ? (new Date(task.targetFixDate).toString() !== 'Invalid Date'
                              ? new Date(task.targetFixDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
                              : task.targetFixDate)
                          : 'N/A';

                        return (
                          <label key={task.id} className={`flex items-start gap-4 rounded-2xl border px-4 py-4 cursor-pointer transition-colors ${isChecked ? 'border-brand-300 bg-brand-50/60' : 'border-gray-100 bg-white hover:border-brand-200 hover:bg-brand-50/30'}`}>
                            <input
                              type="checkbox"
                              checked={isChecked}
                              onChange={() => setSelectedTaskPlanIds(prev => prev.includes(task.id) ? prev.filter(id => id !== task.id) : [...prev, task.id])}
                              className="mt-1 h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500"
                            />
                            <div className="min-w-0 flex-1">
                              <div className="flex flex-wrap items-center gap-2">
                                <StatusBadge status={task.status} size="sm" />
                                <span className="text-sm font-bold text-gray-900 truncate">{task.customerName || '- ไม่ระบุชื่อลูกค้า -'}</span>
                                <span className="text-xs font-medium px-2 py-0.5 rounded-md whitespace-nowrap bg-white text-gray-400 border border-gray-100">ID: {task.id}</span>
                              </div>
                              <div className="text-sm text-gray-600 mt-2">อาคาร {task.building} - Unit {task.unit}</div>
                              <div className="text-xs text-gray-500 mt-1">Defects: {task.defects?.length || 0} | Target Date: {formattedDate}</div>
                            </div>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                  <div className="px-5 md:px-6 py-4 border-t border-gray-100 bg-white flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                    <button onClick={() => setIsTaskPlanSelectorOpen(false)} className="rounded-2xl border border-gray-200 bg-white px-5 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">ยกเลิก</button>
                    <button onClick={handleConfirmExportTaskPlans} className="rounded-2xl bg-brand-600 px-5 py-3 text-sm font-bold text-white hover:bg-brand-700 transition-colors inline-flex items-center justify-center">
                      <Icons.Download className="w-4 h-4 mr-2" /> Export ใบงานที่เลือก ({selectedTaskPlanIds.length})
                    </button>
                  </div>
               </div>
             </div>
           )}
           {pdfLinks.length > 0 && (
             <div className="fixed inset-0 z-[80] bg-slate-950/50 backdrop-blur-sm flex items-center justify-center p-4">
               <div className="w-full max-w-2xl rounded-[28px] bg-white border border-gray-100 shadow-2xl overflow-hidden">
                 <div className="px-5 md:px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-brand-50 to-white">
                   <div className="flex items-start justify-between gap-4">
                     <div>
                       <div className="text-xs font-bold uppercase tracking-[0.18em] text-brand-500">PDF Export</div>
                       <div className="text-xl font-extrabold text-gray-900 mt-1">สร้างเอกสารแผนงานสำเร็จ</div>
                       <div className="text-sm text-gray-500 mt-1">เลือกเปิดไฟล์ PDF ที่สร้างเสร็จแล้วได้จากรายการด้านล่าง</div>
                     </div>
                     <button onClick={() => setPdfLinks([])} className="w-10 h-10 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors"><Icons.X /></button>
                   </div>
                 </div>
                 <div className="p-5 md:p-6 space-y-3 max-h-[70vh] overflow-y-auto">
                   {pdfLinks.map((file, index) => (
                     <a key={`${file.taskId || 'pdf'}-${index}`} href={file.url} target="_blank" rel="noreferrer" className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 rounded-2xl border border-gray-100 bg-gray-50/80 px-4 py-4 hover:border-brand-200 hover:bg-brand-50 transition-colors">
                       <div className="min-w-0">
                         <div className="text-sm font-bold text-gray-900 break-all">{file.name || `RepairPlan_${file.taskId || index}.pdf`}</div>
                         <div className="text-xs text-gray-500 mt-1">Task ID: {file.taskId || '-'}</div>
                       </div>
                       <div className="inline-flex items-center text-sm font-bold text-brand-700 shrink-0">
                         เปิดไฟล์ <Icons.ChevronRight className="w-4 h-4 ml-1" />
                       </div>
                     </a>
                   ))}
                 </div>
                 <div className="px-5 md:px-6 py-4 border-t border-gray-100 bg-white flex justify-end">
                   <button onClick={() => setPdfLinks([])} className="rounded-2xl border border-gray-200 bg-white px-5 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors">ปิด</button>
                 </div>
               </div>
             </div>
           )}
           
           {isSaving && <FullScreenLoader message="กำลังบันทึกข้อมูล..." />}
           {isRefreshing && <FullScreenLoader message="กำลังรีเฟรชข้อมูล..." />}
           {isDeleting && <FullScreenLoader message="กำลังลบข้อมูล..." type="danger" />}
           {isExportingPDF && <FullScreenLoader message="กำลังสร้างไฟล์ PDF..." type="primary" />}
        </div>
      );
    } // End of App Component

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
