    // --- Component จัดการรูปภาพ (วาด + ใส่ลายน้ำ พิกัด & เวลา) ---
    const ImageAnnotator = ({ imageSrc, field, onSave, onClose }) => {
      const canvasRef = useRef(null);
      const historyRef = useRef([[]]);
      const annotationIdRef = useRef(0);
      const [locationLabel, setLocationLabel] = useState('กำลังหาตำแหน่ง...');
      const [color, setColor] = useState('#ef4444');
      const [tool, setTool] = useState('move');
      const [brushSize, setBrushSize] = useState(5);
      const [fontScale, setFontScale] = useState(1);
      const [shapeStart, setShapeStart] = useState(null);
      const [draftShape, setDraftShape] = useState(null);
      const [baseImageElement, setBaseImageElement] = useState(null);
      const [overlayTimestamp, setOverlayTimestamp] = useState('');
      const [annotations, setAnnotations] = useState([]);
      const [selectedAnnotationId, setSelectedAnnotationId] = useState(null);
      const [dragState, setDragState] = useState(null);
      const [isStylePanelOpen, setIsStylePanelOpen] = useState(false);

      const cloneAnnotations = (items) => JSON.parse(JSON.stringify(items || []));

      const pushHistory = (items) => {
        historyRef.current = [...historyRef.current, cloneAnnotations(items)].slice(-20);
      };

      const createAnnotationId = () => {
        annotationIdRef.current += 1;
        return `annotation-${annotationIdRef.current}`;
      };

      const getCanvasPoint = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : null);
        const clientX = touch ? touch.clientX : e.clientX;
        const clientY = touch ? touch.clientY : e.clientY;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const drawOverlay = (ctx, width, height, locationText, timestampText) => {
        const safeLocation = String(locationText || 'Location: ไม่สามารถระบุตำแหน่งได้');
        const safeTimestamp = String(timestampText || new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' }));
        const overlayText = `${safeTimestamp}  |  ${safeLocation}`;
        const paddingX = 0;
        const paddingY = 0;
        const fontSize = Math.max(14, Math.round(width * 0.02));
        const boxHeight = fontSize + 22;
        const boxWidth = width - (paddingX * 2);
        const boxX = paddingX;
        const boxY = height - boxHeight - paddingY;

        ctx.save();
        ctx.fillStyle = 'rgba(13, 148, 136, 0.60)';
        ctx.strokeStyle = 'rgba(240, 253, 250, 0.55)';
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 0);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#f0fdfa';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `700 ${fontSize}px Inter, Sarabun, sans-serif`;
        ctx.lineWidth = Math.max(2, brushSize * 0.35);
        ctx.strokeStyle = 'rgba(4, 47, 46, 0.42)';
        ctx.strokeText(overlayText, boxX + (boxWidth / 2), boxY + (boxHeight / 2));
        ctx.fillText(overlayText, boxX + (boxWidth / 2), boxY + (boxHeight / 2));
        ctx.restore();
      };

      const getAnnotationBounds = (annotation) => {
        if (!annotation) return null;
        if (annotation.type === 'pen') {
          const points = annotation.points || [];
          if (!points.length) return null;
          const xs = points.map(point => point.x);
          const ys = points.map(point => point.y);
          return {
            x: Math.min(...xs),
            y: Math.min(...ys),
            width: Math.max(...xs) - Math.min(...xs),
            height: Math.max(...ys) - Math.min(...ys)
          };
        }
        if (annotation.type === 'text') {
          const width = Math.max(80, (annotation.text || '').length * annotation.fontSize * 0.58);
          const height = annotation.fontSize * 1.3;
          return { x: annotation.x, y: annotation.y, width, height };
        }
        if (annotation.type === 'circle') {
          const radius = Math.sqrt(((annotation.x2 - annotation.x1) ** 2) + ((annotation.y2 - annotation.y1) ** 2));
          return { x: annotation.x1 - radius, y: annotation.y1 - radius, width: radius * 2, height: radius * 2 };
        }
        return {
          x: Math.min(annotation.x1, annotation.x2),
          y: Math.min(annotation.y1, annotation.y2),
          width: Math.abs(annotation.x2 - annotation.x1),
          height: Math.abs(annotation.y2 - annotation.y1)
        };
      };

      const drawSingleAnnotation = (ctx, annotation, isSelected = false) => {
        if (!annotation) return;
        ctx.save();
        ctx.strokeStyle = annotation.color;
        ctx.fillStyle = annotation.color;
        ctx.lineWidth = annotation.size;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (annotation.type === 'pen') {
          const points = annotation.points || [];
          if (points.length > 1) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.slice(1).forEach(point => ctx.lineTo(point.x, point.y));
            ctx.stroke();
          } else if (points.length === 1) {
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, annotation.size / 2, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (annotation.type === 'rect') {
          ctx.strokeRect(annotation.x1, annotation.y1, annotation.x2 - annotation.x1, annotation.y2 - annotation.y1);
        } else if (annotation.type === 'circle') {
          const radius = Math.sqrt(((annotation.x2 - annotation.x1) ** 2) + ((annotation.y2 - annotation.y1) ** 2));
          ctx.beginPath();
          ctx.arc(annotation.x1, annotation.y1, radius, 0, Math.PI * 2);
          ctx.stroke();
        } else if (annotation.type === 'text') {
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.font = `700 ${annotation.fontSize}px Inter, Sarabun, sans-serif`;
          ctx.strokeStyle = 'rgba(15, 23, 42, 0.75)';
          ctx.lineWidth = Math.max(2, annotation.size * 0.35);
          ctx.strokeText(annotation.text, annotation.x, annotation.y);
          ctx.fillText(annotation.text, annotation.x, annotation.y);
        }

        if (isSelected) {
          const bounds = getAnnotationBounds(annotation);
          if (bounds) {
            ctx.save();
            ctx.setLineDash([10, 8]);
            ctx.strokeStyle = 'rgba(255,255,255,0.95)';
            ctx.lineWidth = 2;
            ctx.strokeRect(bounds.x - 8, bounds.y - 8, bounds.width + 16, bounds.height + 16);
            ctx.restore();
          }
        }

        ctx.restore();
      };

      const renderCanvas = (previewAnnotation = null, overrideAnnotations = null, overrideSelectedId = selectedAnnotationId) => {
        const canvas = canvasRef.current;
        if (!canvas || !baseImageElement) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(baseImageElement, 0, 0, width, height);
        ctx.font = `700 ${Math.max(15, Math.round(width * 0.024))}px Inter, Sarabun, sans-serif`;
        drawOverlay(ctx, width, height, locationLabel, overlayTimestamp);

        const items = overrideAnnotations || annotations;
        items.forEach(item => drawSingleAnnotation(ctx, item, item.id === overrideSelectedId));
        if (previewAnnotation) drawSingleAnnotation(ctx, previewAnnotation, false);
      };

      const distanceToSegment = (point, start, end) => {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        if (dx === 0 && dy === 0) return Math.hypot(point.x - start.x, point.y - start.y);
        const t = Math.max(0, Math.min(1, (((point.x - start.x) * dx) + ((point.y - start.y) * dy)) / ((dx * dx) + (dy * dy))));
        const projection = { x: start.x + (t * dx), y: start.y + (t * dy) };
        return Math.hypot(point.x - projection.x, point.y - projection.y);
      };

      const hitTestAnnotation = (annotation, point) => {
        const threshold = Math.max(12, annotation.size * 2.5);
        if (annotation.type === 'text') {
          const bounds = getAnnotationBounds(annotation);
          return bounds && point.x >= bounds.x - 8 && point.x <= bounds.x + bounds.width + 8 && point.y >= bounds.y - 8 && point.y <= bounds.y + bounds.height + 8;
        }
        if (annotation.type === 'pen') {
          const points = annotation.points || [];
          for (let i = 0; i < points.length - 1; i += 1) {
            if (distanceToSegment(point, points[i], points[i + 1]) <= threshold) return true;
          }
          return false;
        }
        if (annotation.type === 'rect') {
          const bounds = getAnnotationBounds(annotation);
          if (!bounds) return false;
          const onVertical = Math.abs(point.x - bounds.x) <= threshold || Math.abs(point.x - (bounds.x + bounds.width)) <= threshold;
          const onHorizontal = Math.abs(point.y - bounds.y) <= threshold || Math.abs(point.y - (bounds.y + bounds.height)) <= threshold;
          const withinY = point.y >= bounds.y - threshold && point.y <= bounds.y + bounds.height + threshold;
          const withinX = point.x >= bounds.x - threshold && point.x <= bounds.x + bounds.width + threshold;
          return (onVertical && withinY) || (onHorizontal && withinX);
        }
        if (annotation.type === 'circle') {
          const radius = Math.sqrt(((annotation.x2 - annotation.x1) ** 2) + ((annotation.y2 - annotation.y1) ** 2));
          const distance = Math.hypot(point.x - annotation.x1, point.y - annotation.y1);
          return Math.abs(distance - radius) <= threshold;
        }
        return distanceToSegment(point, { x: annotation.x1, y: annotation.y1 }, { x: annotation.x2, y: annotation.y2 }) <= threshold;
      };

      const findAnnotationAtPoint = (point) => {
        for (let i = annotations.length - 1; i >= 0; i -= 1) {
          if (hitTestAnnotation(annotations[i], point)) return annotations[i];
        }
        return null;
      };

      const translateAnnotation = (annotation, dx, dy) => {
        if (!annotation) return annotation;
        if (annotation.type === 'pen') {
          return {
            ...annotation,
            points: (annotation.points || []).map(point => ({ x: point.x + dx, y: point.y + dy }))
          };
        }
        if (annotation.type === 'text') {
          return { ...annotation, x: annotation.x + dx, y: annotation.y + dy };
        }
        return {
          ...annotation,
          x1: annotation.x1 + dx,
          y1: annotation.y1 + dy,
          x2: annotation.x2 + dx,
          y2: annotation.y2 + dy
        };
      };

      const handleUndo = () => {
        if (historyRef.current.length <= 1) return;
        historyRef.current = historyRef.current.slice(0, -1);
        const previous = cloneAnnotations(historyRef.current[historyRef.current.length - 1]);
        setAnnotations(previous);
        setSelectedAnnotationId(null);
        setDraftShape(null);
      };

      const handleClearDrawing = () => {
        pushHistory(annotations);
        setAnnotations([]);
        setSelectedAnnotationId(null);
        setDraftShape(null);
        setDragState(null);
      };

      const handleDeleteSelected = () => {
        if (!selectedAnnotationId) return;
        pushHistory(annotations);
        setAnnotations(annotations.filter(item => item.id !== selectedAnnotationId));
        setSelectedAnnotationId(null);
      };

      const handleSave = () => {
        const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.9);
        onSave(field, dataUrl);
      };

      useEffect(() => {
        let cancelled = false;

        const resolveLocationLabel = async (latitude, longitude) => {
          try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`, {
              headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error('Reverse geocode failed');
            const data = await response.json();
            const address = data.address || {};
            const primary = [address.road, address.suburb || address.neighbourhood, address.city || address.town || address.village, address.state]
              .filter(Boolean)
              .slice(0, 3)
              .join(', ');
            return primary || data.display_name || `Lat ${latitude.toFixed(5)}, Lng ${longitude.toFixed(5)}`;
          } catch (error) {
            return `Lat ${latitude.toFixed(5)}, Lng ${longitude.toFixed(5)}`;
          }
        };

        const initializeCanvas = (locationText, timestampText) => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const img = new Image();
          img.onload = () => {
            if (cancelled) return;
            const MAX_WIDTH = 1280;
            const MAX_HEIGHT = 1280;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height = Math.round((height * MAX_WIDTH) / width);
                width = MAX_WIDTH;
              }
            } else if (height > MAX_HEIGHT) {
              width = Math.round((width * MAX_HEIGHT) / height);
              height = MAX_HEIGHT;
            }

            canvas.width = width;
            canvas.height = height;
            setBaseImageElement(img);
            setAnnotations([]);
            setSelectedAnnotationId(null);
            setDraftShape(null);
            setDragState(null);
            historyRef.current = [[]];
          };
          img.src = imageSrc;
        };

        const initialTimestamp = new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
        setOverlayTimestamp(initialTimestamp);

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            async (pos) => {
              const resolved = await resolveLocationLabel(pos.coords.latitude, pos.coords.longitude);
              if (cancelled) return;
              setLocationLabel(resolved);
              initializeCanvas(resolved, initialTimestamp);
            },
            () => {
              const fallback = 'Location: ไม่สามารถดึงพิกัดได้';
              if (cancelled) return;
              setLocationLabel(fallback);
              initializeCanvas(fallback, initialTimestamp);
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
          );
        } else {
          const fallback = 'Location: ไม่รองรับการดึงพิกัด';
          setLocationLabel(fallback);
          initializeCanvas(fallback, initialTimestamp);
        }

        return () => {
          cancelled = true;
        };
      }, [imageSrc]);

      useEffect(() => {
        renderCanvas(draftShape);
      }, [baseImageElement, annotations, draftShape, selectedAnnotationId, locationLabel, overlayTimestamp]);

      const startDrawing = (e) => {
        const point = getCanvasPoint(e);

        if (tool === 'move') {
          const picked = findAnnotationAtPoint(point);
          if (!picked) {
            setSelectedAnnotationId(null);
            setDragState(null);
            return;
          }
          pushHistory(annotations);
          setSelectedAnnotationId(picked.id);
          setDragState({ annotationId: picked.id, startPoint: point, original: cloneAnnotations(annotations) });
          return;
        }

        if (tool === 'text') {
          const text = window.prompt('กรอกข้อความที่ต้องการใส่บนรูปภาพ');
          if (!text) return;
          const canvas = canvasRef.current;
          const nextAnnotation = {
            id: createAnnotationId(),
            type: 'text',
            text,
            x: point.x,
            y: point.y,
            color,
            size: Math.max(2, brushSize * 0.35),
            fontSize: Math.max(18, Math.round(canvas.width * 0.028 * fontScale))
          };
          pushHistory(annotations);
          setAnnotations([...annotations, nextAnnotation]);
          setSelectedAnnotationId(nextAnnotation.id);
          return;
        }

        setSelectedAnnotationId(null);
        setShapeStart(point);
        if (tool === 'pen') {
          setDraftShape({
            id: createAnnotationId(),
            type: 'pen',
            color,
            size: Math.max(2, brushSize * ((canvasRef.current?.width || 800) / 800)),
            points: [point]
          });
          return;
        }

        setDraftShape({
          id: createAnnotationId(),
          type: tool,
          color,
          size: Math.max(2, brushSize * ((canvasRef.current?.width || 800) / 800)),
          x1: point.x,
          y1: point.y,
          x2: point.x,
          y2: point.y
        });
      };

      const draw = (e) => {
        const point = getCanvasPoint(e);

        if (tool === 'move') {
          if (!dragState) return;
          if (e.cancelable) e.preventDefault();
          const dx = point.x - dragState.startPoint.x;
          const dy = point.y - dragState.startPoint.y;
          const moved = dragState.original.map(item => item.id === dragState.annotationId ? translateAnnotation(item, dx, dy) : item);
          setAnnotations(moved);
          return;
        }

        if (!shapeStart || !draftShape) return;
        if (e.cancelable) e.preventDefault();

        if (tool === 'pen') {
          setDraftShape(prev => ({ ...prev, points: [...prev.points, point] }));
          return;
        }

        setDraftShape(prev => ({ ...prev, x2: point.x, y2: point.y }));
      };

      const finishDrawing = () => {
        if (tool === 'move') {
          setDragState(null);
          return;
        }

        if (!draftShape) {
          setShapeStart(null);
          return;
        }

        if (draftShape.type === 'pen' && (!draftShape.points || !draftShape.points.length)) {
          setDraftShape(null);
          setShapeStart(null);
          return;
        }

        if (draftShape.type !== 'pen') {
          const bounds = getAnnotationBounds(draftShape);
          if (!bounds || (bounds.width < 3 && bounds.height < 3)) {
            setDraftShape(null);
            setShapeStart(null);
            return;
          }
        }

        pushHistory(annotations);
        setAnnotations([...annotations, draftShape]);
        setSelectedAnnotationId(draftShape.id);
        setDraftShape(null);
        setShapeStart(null);
      };

      const colors = ['#ef4444', '#f97316', '#3b82f6', '#22c55e', '#a855f7', '#ffffff'];
      const tools = [
        { id: 'move', label: 'Move', icon: Icons.Move },
        { id: 'pen', label: 'วาด', icon: Icons.Edit },
        { id: 'rect', label: 'กรอบ', icon: Icons.Square },
        { id: 'circle', label: 'วงกลม', icon: Icons.Circle },
        { id: 'text', label: 'ข้อความ', icon: Icons.Type }
      ];

      return (
        <div className="fixed inset-0 bg-gray-900/95 z-[60] flex flex-col items-center justify-center p-3 md:p-4">
          <div className="text-white mb-3 flex justify-between w-full max-w-5xl items-center gap-4">
            <div>
              <span className="font-bold text-lg">แก้ไขและใส่ข้อมูลบนรูปภาพ</span>
              <div className="text-xs md:text-sm text-slate-300 mt-1">ระบบจะใส่เวลาและตำแหน่งให้อัตโนมัติ พร้อมรองรับ tablet/mobile</div>
            </div>
            <button onClick={onClose} className="text-gray-400 hover:text-white p-2 bg-gray-800 rounded-full"><Icons.X className="w-5 h-5"/></button>
          </div>
          
          <div className="w-full max-w-5xl flex flex-col gap-4 items-start">
            <div className="relative border border-gray-600 bg-black overflow-hidden w-full rounded-3xl shadow-2xl" style={{ maxHeight: '72vh' }}>
              <div className="absolute top-3 right-3 z-10 max-h-[calc(100%-24px)] w-[76px] md:w-[88px] overflow-y-auto no-scrollbar rounded-2xl bg-slate-900/88 border border-slate-700 shadow-xl backdrop-blur-md p-2 flex flex-col gap-2">
                {tools.map(item => {
                  const Icon = item.icon;
                  return (
                    <button
                      key={item.id}
                      onClick={() => setTool(item.id)}
                      className={`min-h-[56px] rounded-2xl text-[11px] md:text-xs font-semibold transition-all flex flex-col items-center justify-center gap-1 px-2 py-2 ${tool === item.id ? 'bg-brand-500 text-white shadow-lg shadow-brand-900/20' : 'bg-slate-800/90 text-slate-100 hover:bg-slate-700'}`}
                    >
                      <Icon className="w-4 h-4 md:w-5 md:h-5" />
                      <span className="leading-tight text-center">{item.label}</span>
                    </button>
                  );
                })}
                <button onClick={() => setIsStylePanelOpen(prev => !prev)} className={`min-h-[56px] rounded-2xl text-[11px] md:text-xs font-semibold transition-all flex flex-col items-center justify-center gap-1 px-2 py-2 ${isStylePanelOpen ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-900/20' : 'bg-slate-800/90 text-slate-100 hover:bg-slate-700'}`}>
                  <Icons.File className="w-4 h-4" /> ตั้งค่า
                </button>
                <button onClick={handleUndo} disabled={historyRef.current.length <= 1} className={`min-h-[56px] rounded-2xl text-[11px] md:text-xs font-semibold transition-all flex flex-col items-center justify-center gap-1 px-2 py-2 ${historyRef.current.length <= 1 ? 'bg-slate-800/60 text-slate-500 cursor-not-allowed' : 'bg-slate-800/90 text-slate-100 hover:bg-slate-700'}`}>
                  <Icons.Undo className="w-4 h-4" /> ย้อนกลับ
                </button>
                <button onClick={handleDeleteSelected} disabled={!selectedAnnotationId} className={`min-h-[56px] rounded-2xl text-[11px] md:text-xs font-semibold transition-all flex flex-col items-center justify-center gap-1 px-2 py-2 ${!selectedAnnotationId ? 'bg-slate-800/60 text-slate-500 cursor-not-allowed' : 'bg-amber-500/90 text-white hover:bg-amber-500'}`}>
                  <Icons.Trash className="w-4 h-4" /> ลบชิ้น
                </button>
                <button onClick={handleClearDrawing} className="min-h-[56px] rounded-2xl text-[11px] md:text-xs font-semibold transition-all flex flex-col items-center justify-center gap-1 px-2 py-2 bg-rose-500/90 text-white hover:bg-rose-500">
                  <Icons.Trash className="w-4 h-4" /> ลบเส้น
                </button>
              </div>

              {isStylePanelOpen && (
                <div className="absolute top-3 right-[92px] md:right-[104px] z-10 w-[min(320px,calc(100%-116px))] rounded-2xl bg-slate-900/88 border border-slate-700 shadow-xl backdrop-blur-md p-3">
                  <div className="text-slate-100 text-sm font-bold mb-3 flex items-center justify-between">
                    <span>ตั้งค่าการวาด</span>
                    <button onClick={() => setIsStylePanelOpen(false)} className="text-slate-400 hover:text-white p-1 rounded-lg bg-slate-800/80"><Icons.X className="w-4 h-4" /></button>
                  </div>
                  <div className="flex flex-wrap items-center gap-2 mb-3">
                    {colors.map(c => (
                      <button
                        key={c}
                        onClick={() => setColor(c)}
                        className={`w-8 h-8 rounded-full border-2 transition-transform ${color === c ? 'border-white scale-110 shadow-lg' : 'border-white/20 opacity-90 hover:opacity-100'}`}
                        style={{ backgroundColor: c }}
                      ></button>
                    ))}
                  </div>
                  <div className="grid grid-cols-1 gap-3 text-slate-100 text-xs">
                    <label className="flex items-center gap-3">
                      <span className="w-16 shrink-0">เส้น {brushSize}px</span>
                      <input type="range" min="2" max="18" value={brushSize} onChange={e => setBrushSize(Number(e.target.value))} className="w-full accent-brand-500" />
                    </label>
                    <label className="flex items-center gap-3">
                      <span className="w-16 shrink-0">Text {fontScale.toFixed(1)}x</span>
                      <input type="range" min="0.8" max="1.8" step="0.1" value={fontScale} onChange={e => setFontScale(Number(e.target.value))} className="w-full accent-brand-500" />
                    </label>
                  </div>
                  <div className="mt-3 text-[11px] text-slate-300 leading-relaxed">
                    {tool === 'move' ? 'เลือก Move แล้วแตะเส้น/กรอบ/ข้อความเพื่อย้ายตำแหน่ง' : 'เลือกสีและขนาดก่อนวาด ระบบจะใช้ค่าปัจจุบันกับ annotation ชิ้นใหม่'}
                  </div>
                </div>
              )}

              <canvas 
                ref={canvasRef}
                onMouseDown={startDrawing} onMouseUp={finishDrawing} onMouseMove={draw} onMouseLeave={finishDrawing}
                onTouchStart={startDrawing} onTouchEnd={finishDrawing} onTouchMove={draw}
                className={`w-full h-auto touch-none ${tool === 'move' ? 'cursor-grab' : 'cursor-crosshair'}`}
              />
            </div>
          </div>

          <div className="flex gap-3 md:gap-4 mt-4 w-full max-w-5xl">
            <button onClick={onClose} className="flex-1 py-3.5 bg-gray-800 hover:bg-gray-700 border border-gray-600 transition-colors text-white rounded-xl font-bold">ยกเลิก</button>
            <button onClick={handleSave} className="flex-1 py-3.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold flex items-center justify-center shadow-lg shadow-brand-200/50">
              <span className="mr-2"><Icons.CheckCircle/></span> ยืนยันรูปภาพ
            </button>
          </div>
        </div>
      );
    };

    // --- Component จัดการอัปโหลดรูป ---
    const DefectImagesUploader = ({ defect, taskStatus, onSuccess, isSupplier = false }) => {
      const [images, setImages] = useState({
        imgUnit: defect?.imgUnit || '',
        imgBefore: defect?.imgBefore || '',
        imgDuring: defect?.imgDuring || '',
        imgAfter: defect?.imgAfter || ''
      });
      const [previewDataUrls, setPreviewDataUrls] = useState({});
      const [uploadingField, setUploadingField] = useState(null);
      const [isSavingStatus, setIsSavingStatus] = useState(false);
      const [editingImage, setEditingImage] = useState(null);
      const [previewImage, setPreviewImage] = useState(null);

      const isTaskActive = taskStatus === 'Active';
      const isTaskRejected = taskStatus === 'Reject';
      const isTaskClosed = taskStatus === 'Closed';
      const isDefectFixed = defect?.status === 'แก้ไขแล้ว';

      useEffect(() => {
        setImages({
          imgUnit: defect?.imgUnit || '',
          imgBefore: defect?.imgBefore || '',
          imgDuring: defect?.imgDuring || '',
          imgAfter: defect?.imgAfter || ''
        });
      }, [defect?.id, defect?.imgUnit, defect?.imgBefore, defect?.imgDuring, defect?.imgAfter]);

      useEffect(() => {
        let cancelled = false;
        const fields = ['imgUnit', 'imgBefore', 'imgDuring', 'imgAfter'];

        fields.forEach(field => {
          const value = images[field];

          if (!value) {
            setPreviewDataUrls(prev => ({ ...prev, [field]: '' }));
            return;
          }

          if (String(value).startsWith('data:image')) {
            setPreviewDataUrls(prev => ({ ...prev, [field]: value }));
            return;
          }

          google.script.run
            .withSuccessHandler(dataUrl => {
              if (cancelled) return;
              setPreviewDataUrls(prev => ({ ...prev, [field]: dataUrl || value }));
            })
            .withFailureHandler(() => {
              if (cancelled) return;
              setPreviewDataUrls(prev => ({ ...prev, [field]: value }));
            })
            .getDefectImagePreviewDataUrl(value);
        });

        return () => {
          cancelled = true;
        };
      }, [images.imgUnit, images.imgBefore, images.imgDuring, images.imgAfter]);

      const getDirectImageUrl = (url) => {
        if (!url) return '';
        if (url.startsWith('data:image')) return url;
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w2000`;
        return url;
      };

      const getImageUrlCandidates = (url) => {
        if (!url) return [];
        if (url.startsWith('data:image')) return [url];
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
          const fileId = match[1];
          return [
            `https://drive.google.com/uc?export=view&id=${fileId}`,
            `https://drive.google.com/uc?id=${fileId}`,
            `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000`,
            url
          ];
        }
        return [url];
      };

      const handleFileChange = (field, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            if (isSupplier) {
              setImages(prev => ({ ...prev, [field]: reader.result }));
            } else {
              setEditingImage({ field: field, src: reader.result });
            }
          };
          reader.readAsDataURL(file);
        }
        e.target.value = null;
      };

      const handleAnnotatorSave = (field, dataUrl) => {
        setImages(prev => ({ ...prev, [field]: dataUrl }));
        setEditingImage(null);
      };

      const handleClearImage = (field) => {
        if (!window.confirm('คุณต้องการลบรูปภาพนี้ใช่หรือไม่?')) return;
        if (!window.confirm('ยืนยันอีกครั้งเพื่อลบรูปภาพนี้')) return;
        setImages(prev => ({ ...prev, [field]: '' }));
      };

      const handleUploadSingle = (field) => {
        setUploadingField(field);
        google.script.run
          .withSuccessHandler(url => {
            setImages(prev => ({ ...prev, [field]: url }));
            setUploadingField(null);
            onSuccess();
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกรูป: ' + err.message);
            setUploadingField(null);
          })
          .uploadSingleDefectImage(defect?.id, field, images[field]);
      };

      const handleFinishDefect = () => {
        setIsSavingStatus(true);
        google.script.run
          .withSuccessHandler(() => {
            alert('เปลี่ยนสถานะ Defect เป็น "แก้ไขแล้ว" สำเร็จ');
            setIsSavingStatus(false);
            onSuccess();
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาด: ' + err.message);
            setIsSavingStatus(false);
          })
          .updateDefectStatus(defect?.id, 'แก้ไขแล้ว');
      };

      const ImagePreviewModal = () => {
        const canEditPreview = !isSupplier && previewImage && !isTaskRejected && !isTaskClosed && !isDefectFixed && images[previewImage.field] && !String(images[previewImage.field]).startsWith('http');
        const modalPreviewSource = previewImage?.field ? (previewDataUrls[previewImage.field] || previewImage?.src || '') : (previewImage?.src || '');
        const previewCandidates = getImageUrlCandidates(modalPreviewSource);
        const [previewCandidateIndex, setPreviewCandidateIndex] = useState(0);
        const activePreviewSrc = previewCandidates[Math.min(previewCandidateIndex, Math.max(previewCandidates.length - 1, 0))] || modalPreviewSource;

        useEffect(() => {
          if (modalPreviewSource) setPreviewCandidateIndex(0);
        }, [modalPreviewSource]);

        if (!previewImage) return null;

        return (
          <div className="fixed inset-0 z-[65] bg-slate-950/90 backdrop-blur-sm p-3 md:p-6 flex items-center justify-center">
            <div className="w-full max-w-6xl h-full max-h-[92vh] bg-slate-900/95 border border-slate-700 rounded-3xl overflow-hidden flex flex-col shadow-2xl">
              <div className="px-4 md:px-6 py-4 border-b border-slate-800 flex items-center justify-between gap-4">
                <div>
                  <div className="text-white text-base md:text-lg font-bold">{previewImage.label}</div>
                  <div className="text-slate-400 text-xs md:text-sm mt-1">แตะ/คลิกดูรูปเต็ม และกดแก้ไขได้ทั้งบน mobile, tablet และ desktop</div>
                </div>
                <button onClick={() => setPreviewImage(null)} className="p-2 rounded-full bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 transition-colors"><Icons.X className="w-5 h-5" /></button>
              </div>

              <div className="flex-1 overflow-auto p-3 md:p-6 flex items-center justify-center bg-gradient-to-br from-slate-950 to-slate-900">
                <img src={activePreviewSrc} alt={previewImage.label} onError={() => setPreviewCandidateIndex(prev => (prev < previewCandidates.length - 1 ? prev + 1 : prev))} className="block w-auto max-w-full h-auto max-h-full object-contain rounded-2xl shadow-2xl border border-slate-700 bg-white" loading="eager" referrerPolicy="no-referrer" />
              </div>

              <div className="px-4 md:px-6 py-4 border-t border-slate-800 flex flex-col sm:flex-row gap-3 justify-end bg-slate-900/90">
                {canEditPreview && (
                  <button onClick={() => { setEditingImage({ field: previewImage.field, src: images[previewImage.field] }); setPreviewImage(null); }} className="px-5 py-3 rounded-2xl bg-brand-500 hover:bg-brand-600 text-white font-bold text-sm shadow-lg shadow-brand-900/20 flex items-center justify-center gap-2">
                    <Icons.Edit className="w-4 h-4" /> แก้ไข / Annotate รูป
                  </button>
                )}
                {!canEditPreview && images[previewImage.field] && String(images[previewImage.field]).startsWith('http') && <div className="px-4 py-3 rounded-2xl bg-emerald-500/15 border border-emerald-400/20 text-emerald-200 text-sm font-semibold">รูปนี้บันทึกแล้ว จะแก้ไขเพิ่มเติมไม่ได้</div>}
                <button onClick={() => setPreviewImage(null)} className="px-5 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 text-slate-100 font-bold text-sm">ปิดหน้าดูรูป</button>
              </div>
            </div>
          </div>
        );
      };

      const ImageBox = ({ label, field, disabledReason }) => {
        const isDisabled = !!disabledReason;
        const currentImg = images[field];
        const isBase64 = currentImg && currentImg.startsWith('data:image');
        const isUploaded = currentImg && currentImg.startsWith('http');
        const isUploading = uploadingField === field;
        const canEditImage = !isSupplier && !isDisabled && !isTaskRejected && !isTaskClosed && !isDefectFixed && !isUploaded;
        const resolvedPreviewSource = previewDataUrls[field] || currentImg;
        const previewCandidates = getImageUrlCandidates(resolvedPreviewSource);
        const [previewCandidateIndex, setPreviewCandidateIndex] = useState(0);
        const previewSrc = previewCandidates[Math.min(previewCandidateIndex, Math.max(previewCandidates.length - 1, 0))] || getDirectImageUrl(resolvedPreviewSource);

        useEffect(() => {
          setPreviewCandidateIndex(0);
        }, [resolvedPreviewSource]);

        return (
          <div className={`relative border rounded-2xl p-4 md:p-5 flex flex-col items-center justify-between shadow-sm transition-all ${isDisabled ? 'bg-gray-50 border-gray-200' : isBase64 ? 'bg-brand-50 border-brand-300' : 'bg-white border-gray-200 hover:border-brand-400'}`}>
            <h4 className="font-bold text-gray-800 mb-3 md:mb-4 text-sm md:text-base text-center w-full pb-2 md:pb-3 border-b border-gray-100">{label}</h4>
            
            <div className="flex-1 w-full flex flex-col items-center justify-center mb-4 md:mb-5 relative">
              {currentImg ? (
                <div className="relative group w-full min-h-[224px] sm:min-h-[240px] md:min-h-[256px] lg:min-h-[288px] flex items-center justify-center cursor-zoom-in bg-slate-100 rounded-xl overflow-hidden p-2">
                  <img src={previewSrc} alt={label} onClick={() => setPreviewImage({ field, label, src: resolvedPreviewSource })} onError={() => setPreviewCandidateIndex(prev => (prev < previewCandidates.length - 1 ? prev + 1 : prev))} className={`block max-w-full max-h-[272px] sm:max-h-[304px] md:max-h-[336px] lg:max-h-[384px] w-auto h-auto object-contain rounded-xl border border-gray-200 shadow-sm bg-white ${isDisabled ? 'opacity-50' : ''}`} loading="eager" referrerPolicy="no-referrer" />


                  <div className="absolute inset-x-3 bottom-3 flex items-center justify-between gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                    <button
                      onClick={(e) => {
                        e.stopPropagation();

                        setPreviewImage({ field, label, src: resolvedPreviewSource });
                      }}
                      className="flex-1 bg-slate-900/78 text-white px-3 py-2 rounded-xl text-xs md:text-sm font-semibold backdrop-blur-sm border border-white/10 flex items-center justify-center gap-2"
                    >
                      <Icons.Eye className="w-4 h-4" /> ดูรูปเต็ม
                    </button>

                    {canEditImage && (
                      <button
                        onClick={(e) => {
                          e.stopPropagation();
                          setEditingImage({ field, src: currentImg });
                        }}
                        className="bg-brand-500/95 text-white px-3 py-2 rounded-xl text-xs md:text-sm font-semibold shadow-lg shadow-brand-900/20 border border-brand-300/30 flex items-center justify-center gap-2"
                      >
                        <Icons.Edit className="w-4 h-4" /> แก้ไข
                      </button>
                    )}
                  </div>
                  
                  {!isDisabled && !isTaskRejected && !isTaskClosed && !isDefectFixed && (
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleClearImage(field); }} 
                      className="absolute top-2 left-2 bg-white/90 text-red-500 p-2 rounded-full shadow-md hover:bg-red-50 hover:text-red-600 transition-colors"
                      title="ลบรูปภาพเพื่อเลือกใหม่"
                    >
                      <Icons.Trash className="w-4 h-4" />
                    </button>
                  )}

                  {isUploaded && (
                    <div className="absolute top-3 right-3 bg-gradient-to-br from-emerald-400 to-emerald-500 text-white text-xs font-bold px-3 py-1.5 rounded-full flex items-center shadow-md border border-emerald-300">
                      <span className="mr-1"><Icons.CheckCircle/></span> บันทึกแล้ว
                    </div>
                  )}
                </div>
              ) : (
                <div 
                  className={`h-48 md:h-64 flex flex-col items-center justify-center w-full rounded-xl text-sm text-center p-4 border-2 border-dashed transition-all ${isDisabled ? 'text-gray-400 border-gray-200 bg-gray-50' : 'text-gray-400 border-gray-300 bg-gray-50 hover:bg-brand-50 hover:border-brand-400 hover:text-brand-600 cursor-pointer'}`}
                  onClick={() => !isDisabled && document.getElementById(`file-${field}`).click()}
                >
                  <span className="mb-3 opacity-60 scale-150"><Icons.File /></span>
                  {isDisabled ? disabledReason : <span className="font-semibold">แตะเพื่อเลือกรูปภาพ</span>}
                </div>
              )}
            </div>
            
            <div className="w-full flex flex-col gap-2">
              <input 
                id={`file-${field}`}
                type="file" 
                accept="image/*" 
                onChange={(e) => handleFileChange(field, e)} 
                disabled={isDisabled || isTaskRejected || isDefectFixed || isTaskClosed} 
                className="hidden" 
              />
              
              {isBase64 && (
                <button
                  onClick={() => handleUploadSingle(field)}
                  disabled={isUploading}
                  className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-xl shadow-md font-bold transition-colors flex justify-center items-center animate-pulse hover:animate-none"
                >
                  {isUploading ? 'กำลังบันทึก...' : 'คลิกเพื่อบันทึกรูปนี้'}
                </button>
              )}
            </div>
          </div>
        );
      };

      const allImagesUploadedAndSaved = 
        images.imgUnit && images.imgUnit.startsWith('http') &&
        images.imgBefore && images.imgBefore.startsWith('http') &&
        images.imgDuring && images.imgDuring.startsWith('http') &&
        images.imgAfter && images.imgAfter.startsWith('http');

      return (
        <div className="w-full">
          {editingImage && !isSupplier && <ImageAnnotator imageSrc={editingImage.src} field={editingImage.field} onSave={handleAnnotatorSave} onClose={() => setEditingImage(null)} />}
          {previewImage && <ImagePreviewModal />}
          {uploadingField && <FullScreenLoader message="กำลังอัปโหลดรูปภาพ..." />}
          {isSavingStatus && <FullScreenLoader message="กำลังอัปเดตสถานะ..." />}

          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
              <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">จัดการรูปภาพ</h3>
              <p className="text-sm text-gray-500 mt-1">{isSupplier ? 'สำหรับ Supplier สามารถเพิ่มและบันทึกรูปภาพได้เท่านั้น' : 'แตะรูปเพื่อดูเต็มจอ และแก้ไข/annotate พร้อมเวลาและตำแหน่งได้ทั้งบน mobile, tablet และ desktop'}</p>
            </div>
            <div className="text-right w-full md:w-auto">
              {!isTaskActive && !isTaskRejected && !isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-amber-50 to-yellow-100 text-amber-700 text-sm font-bold rounded-md border border-amber-200 shadow-sm w-full md:w-auto text-center">⚠️ ต้องเปิดใบงาน (Active) ก่อน</span>}
              {isTaskRejected && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-rose-50 to-red-100 text-rose-700 text-sm font-bold rounded-md border border-rose-200 shadow-sm w-full md:w-auto text-center">⚠️ ใบงานถูก Reject ไม่อนุญาต</span>}
              {isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-gray-50 to-slate-100 text-gray-600 text-sm font-bold rounded-md border border-gray-200 shadow-sm w-full md:w-auto text-center">🔒 ใบงานถูกปิดแล้ว</span>}
            </div>
          </div>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8">
            <ImageBox label="1. เลขยูนิต" field="imgUnit" disabledReason={!isTaskActive && !images['imgUnit'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="2. ก่อนแก้ไข" field="imgBefore" disabledReason={isTaskRejected ? "ไม่อนุญาต" : null} />
            <ImageBox label="3. ระหว่างแก้ไข" field="imgDuring" disabledReason={!isTaskActive && !images['imgDuring'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="4. หลังแก้ไข" field="imgAfter" disabledReason={!isTaskActive && !images['imgAfter'] ? "เปิดใบงานก่อน" : null} />
          </div>
          
          <div className="mt-8 flex justify-end border-t border-gray-200 pt-6">
            {isSupplier ? (
              <div className="w-full rounded-2xl border border-cyan-100 bg-cyan-50 px-4 py-3 text-sm font-semibold text-cyan-800 text-center md:text-left">Supplier ทำได้เฉพาะการเพิ่มและบันทึกรูปภาพ การปิด defect จะดำเนินการโดย Staff หรือ Admin</div>
            ) : (
              <button 
                onClick={handleFinishDefect} 
                disabled={!allImagesUploadedAndSaved || isSavingStatus || isDefectFixed || isTaskClosed} 
                className={`px-8 py-3.5 text-white rounded-xl flex items-center font-bold text-sm transition-all w-full md:w-auto justify-center ${
                  isDefectFixed || isTaskClosed ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                  : !allImagesUploadedAndSaved ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                  : 'bg-gradient-to-r from-brand-500 to-emerald-500 hover:from-brand-600 hover:to-emerald-600 shadow-md shadow-emerald-200 hover:-translate-y-0.5'
                }`}
              >
                {isDefectFixed ? <React.Fragment><span className="mr-2"><Icons.CheckCircle className="w-5 h-5" /></span> แก้ไขเสร็จสิ้นแล้ว</React.Fragment> : 
                 <React.Fragment><span className="mr-2"><Icons.CheckCircle className="w-5 h-5" /></span> ยืนยันแก้ไขเสร็จสิ้น</React.Fragment>}
              </button>
            )}
          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      // Auth State
      const [currentUser, setCurrentUser] = useState(() => {
        const savedUser = sessionStorage.getItem('sas_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [authMode, setAuthMode] = useState('LOGIN');
      const [authForm, setAuthForm] = useState({ userId: '', password: '', confirmPassword: '', fullName: '', roleValue: '', email: '', line: '', phone: '' });
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState('');

      const [view, setView] = useState('DASHBOARD');
      const [jobs, setJobs] = useState([]);
      const [ownerMaster, setOwnerMaster] = useState([]);
      const [uniqueSites, setUniqueSites] = useState([]);
      
      const [mainCategories, setMainCategories] = useState([]);
      const [subCategoriesMap, setSubCategoriesMap] = useState({});
      const [teams, setTeams] = useState([]); // State สำหรับเก็บข้อมูลทีมที่ดึงจาก Sheet

      const [isLoading, setIsLoading] = useState(true);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false);
      const [isExportingPDF, setIsExportingPDF] = useState(false);
      const [pdfLinks, setPdfLinks] = useState([]);
      const [isTaskPlanSelectorOpen, setIsTaskPlanSelectorOpen] = useState(false);
      const [selectedTaskPlanIds, setSelectedTaskPlanIds] = useState([]);
      const [taskListStatusFilter, setTaskListStatusFilter] = useState('รอดำเนินการ');

      const [activeJobId, setActiveJobId] = useState(null);
      const [activeTaskId, setActiveTaskId] = useState(null);
      const [activeDefectId, setActiveDefectId] = useState(null);
      
      const [showJobForm, setShowJobForm] = useState(false);
      const [showTaskForm, setShowTaskForm] = useState(false);
      const [showDefectForm, setShowDefectForm] = useState(false);
      const [editingJob, setEditingJob] = useState(null);

      const [managedUsers, setManagedUsers] = useState([]);
      const [isUsersLoading, setIsUsersLoading] = useState(false);
      const [profileForm, setProfileForm] = useState({ fullName: '', email: '', line: '', phone: '', password: '', confirmPassword: '' });

      // --- Sidebar State ---
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      useEffect(() => {
        const handleResize = () => {
          // You can add logic here if you want it to auto-close on certain screen sizes
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const toggleSidebar = () => setIsSidebarOpen(prev => !prev);

      const currentPosition = String(currentUser?.position || '').trim().toLowerCase();
      const isAdmin = currentUser?.isAdmin === true || currentPosition === 'admin' || currentUser?.role === 'ADMIN';
      const isStaff = currentUser?.isStaff === true || currentPosition === 'staff' || currentUser?.role === 'STAFF';
      const isSupplier = currentUser?.isSupplier === true || currentPosition === 'supplier' || currentUser?.role === 'SUPPLIER';
      const canManageProjects = isAdmin || isStaff;
      const canManageUsers = isAdmin;
      const canAccessSettings = isAdmin || isStaff;

      const fetchData = (softRefresh = false) => {
        if (softRefresh) {
          setIsRefreshing(true);
        } else {
          setIsLoading(true);
        }
        
        google.script.run
          .withSuccessHandler(data => { 
            setJobs(JSON.parse(data)); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .withFailureHandler(err => { 
            console.error(err); 
            alert('เกิดข้อผิดพลาดในการโหลดข้อมูล'); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .getAllDataForUser(currentUser?.userId || '');
      };

      const fetchManagedUsers = () => {
        if (!canManageUsers || !currentUser?.userId) return;
        setIsUsersLoading(true);
        google.script.run
          .withSuccessHandler(data => {
            setManagedUsers(JSON.parse(data));
            setIsUsersLoading(false);
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการโหลดผู้ใช้งาน: ' + err.message);
            setIsUsersLoading(false);
          })
          .getUsersForManagement(currentUser.userId);
      };

      const fetchMasterData = () => {
        google.script.run
          .withSuccessHandler(data => {
            const parsed = JSON.parse(data);
            setOwnerMaster(parsed.owners);
            setUniqueSites(parsed.sites);
            setMainCategories(parsed.mainCategories || []);
            setSubCategoriesMap(parsed.subCategories || {});
            setTeams(parsed.teams || []); // บันทึกข้อมูลทีมที่ได้จาก Sheet Team Col C
          })
          .withFailureHandler(err => console.error('Error fetching master data:', err))
          .getMasterData();
      };

      const refreshCurrentUserProfile = () => {
        if (!currentUser?.userId) return;
        google.script.run
          .withSuccessHandler(user => {
            sessionStorage.setItem('sas_user', JSON.stringify(user));
            setCurrentUser(user);
            setProfileForm({
              fullName: user.fullName || '',
              email: user.email || '',
              line: user.line || '',
              phone: user.phone || '',
              password: '',
              confirmPassword: ''
            });
          })
          .withFailureHandler(err => console.error('Error refreshing user profile:', err))
          .getCurrentUserProfile(currentUser.userId);
      };

      useEffect(() => {
        if (!currentUser) return;
        fetchData();
        fetchMasterData();
        fetchManagedUsers();
        refreshCurrentUserProfile();
      }, [currentUser?.userId]);

      useEffect(() => {
        if (!currentUser) return;
        if (isSupplier && !isAdmin && !isStaff && !['SUPPLIER_DEFECTS', 'DEFECT_DETAIL'].includes(view)) {
          setView('SUPPLIER_DEFECTS');
        }
        if (!isSupplier && view === 'SUPPLIER_DEFECTS') {
          setView('DASHBOARD');
        }
        if (!canAccessSettings && view === 'SETTINGS') {
          setView(isSupplier ? 'SUPPLIER_DEFECTS' : 'DASHBOARD');
        }
      }, [currentUser, view]);

      const handleRefreshData = () => {
        fetchData(true);
        fetchManagedUsers();
        refreshCurrentUserProfile();
      };

      const handleLogout = () => {
        sessionStorage.removeItem('sas_user');
        setCurrentUser(null);
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const activeTask = activeJob?.tasks?.find(t => t.id === activeTaskId);
      const activeDefect = activeTask?.defects?.find(d => d.id === activeDefectId);
      const pendingTaskPlanCandidates = (activeJob?.tasks || []).filter(task => (task.status || 'รอดำเนินการ') === 'รอดำเนินการ');
      const areAllPendingTaskPlanCandidatesSelected = pendingTaskPlanCandidates.length > 0 && selectedTaskPlanIds.length === pendingTaskPlanCandidates.length;
      const handleToggleAllPendingTaskPlanCandidates = () => setSelectedTaskPlanIds(areAllPendingTaskPlanCandidatesSelected ? [] : pendingTaskPlanCandidates.map(task => task.id));

      const allTasks = jobs.flatMap(job => job.tasks || []);
      const allDefects = allTasks.flatMap(task => task.defects || []);
      const activeProjectsCount = jobs.filter(job => job.status === 'Active').length;
      const closedProjectsCount = jobs.filter(job => job.status === 'Closed').length;
      const pendingProjectsCount = jobs.filter(job => job.status === 'รอดำเนินการ' || !job.status).length;
      const activeTasksCount = allTasks.filter(task => task.status === 'Active').length;
      const pendingTasksCount = allTasks.filter(task => task.status === 'รอดำเนินการ' || !task.status).length;
      const completedDefectsCount = allDefects.filter(defect => defect.status === 'แก้ไขแล้ว' || defect.status === 'Closed' || defect.status === 'เสร็จสิ้น').length;
      const pendingDefectsCount = allDefects.filter(defect => defect.status === 'ยังไม่แก้ไข' || defect.status === 'รอดำเนินการ' || !defect.status).length;
      const majorDefectsCount = allDefects.filter(defect => defect.major === 'ใช่').length;
      const sasTasksCount = allTasks.filter(task => task.scope === 'SAS').length;
      const voTasksCount = allTasks.filter(task => task.scope === 'VO').length;
      const completionRate = allDefects.length > 0 ? Math.round((completedDefectsCount / allDefects.length) * 100) : 0;
      const topProjects = [...jobs]
        .map(job => ({
          ...job,
          totalDefects: (job.tasks || []).reduce((sum, task) => sum + ((task.defects || []).length), 0),
          activeTasks: (job.tasks || []).filter(task => task.status === 'Active').length
        }))
        .sort((a, b) => b.totalDefects - a.totalDefects)
        .slice(0, 5);
      const urgentDefects = allDefects
        .filter(defect => defect.major === 'ใช่' || defect.status === 'ยังไม่แก้ไข' || defect.status === 'รอดำเนินการ')
        .slice(0, 6);

      const supplierDefects = jobs.flatMap(job => (job.tasks || []).flatMap(task => (task.defects || []).map(defect => ({
        ...defect,
        taskId: task.id,
        taskScope: task.scope,
        taskStatus: task.status,
        building: task.building,
        unit: task.unit,
        customerName: task.customerName,
        jobId: job.id,
        site: job.site,
        owner: job.owner,
        ownerCompany: job.ownerCompany
      }))));

      const handleCreateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .addJob(formData);
      };
      
      const handleUpdateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setEditingJob(null); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .updateJob(formData);
      };

      const handleDeleteJob = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานหลัก ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeJobId === id) setView('JOB_LIST'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteJob(id);
        }
      };
      
      const handleCreateTask = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowTaskForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addTask(activeJobId, formData);
      };

      const handleDeleteTask = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานย่อย ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeTaskId === id) setView('JOB_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteTask(id);
        }
      };
      
      const handleCreateDefect = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowDefectForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addDefect(activeTaskId, formData);
      };

      const handleDeleteDefect = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบรายการ Defect ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeDefectId === id) setView('TASK_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteDefect(id);
        }
      };

      const handleUpdateTaskStatus = (id, status) => {
        if (window.confirm(`⚠️ ยืนยันการเปลี่ยนสถานะเป็น "${status}" ใช่หรือไม่?`)) {
          setIsSaving(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsSaving(false); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).updateTaskStatusAndJob(id, status);
        }
      };

      const handleExportTaskPlans = () => {
        const pendingTasks = pendingTaskPlanCandidates;
        if (pendingTasks.length === 0) return alert('ไม่มีใบงานย่อยสถานะรอดำเนินการให้ Export');
        setSelectedTaskPlanIds(pendingTasks.map(task => task.id));
        setIsTaskPlanSelectorOpen(true);
      };

      const handleConfirmExportTaskPlans = () => {
        if (!activeJobId) return;
        if (selectedTaskPlanIds.length === 0) return alert('กรุณาเลือกใบงานย่อยอย่างน้อย 1 รายการ');
        setIsExportingPDF(true);
        setIsTaskPlanSelectorOpen(false);
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks(JSON.parse(res)); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportTaskPlansToPDF(activeJobId, selectedTaskPlanIds);
      };

      const handleExportSingleTaskPlan = (taskId, e) => {
        e.stopPropagation();
        setIsExportingPDF(true);
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks(JSON.parse(res)); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportTaskPlansToPDF(activeJobId, taskId);
      };

      const handleExportDefectReport = (taskId, e) => {
        e.stopPropagation();
        setIsExportingPDF(true); 
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks([JSON.parse(res)]); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportDefectReportToPDF(taskId);
      };

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        setAuthError('');

        if (authMode === 'REGISTER') {
          if (!authForm.userId.trim()) {
            setAuthError('กรุณากรอก User ID');
            return;
          }
          if (!authForm.fullName.trim()) {
            setAuthError('กรุณากรอกชื่อ - นามสกุล');
            return;
          }
          if (!authForm.roleValue) {
            setAuthError('กรุณาเลือก Role');
            return;
          }
          if (!authForm.password.trim()) {
            setAuthError('กรุณากรอก Password');
            return;
          }
          if (!authForm.confirmPassword.trim()) {
            setAuthError('กรุณากรอก Confirm Password');
            return;
          }
          if (authForm.password !== authForm.confirmPassword) {
            setAuthError('Password และ Confirm Password ไม่ตรงกัน');
            return;
          }
        } else if (!authForm.userId.trim() || !authForm.password.trim()) {
          setAuthError('กรุณากรอก User ID และ Password');
          return;
        }

        setAuthLoading(true);

        if (authMode === 'LOGIN') {
          google.script.run
            .withSuccessHandler(user => {
              try {
                sessionStorage.setItem('sas_user', JSON.stringify(user));
                setCurrentUser(user);
                setProfileForm({
                  fullName: user.fullName || '',
                  email: user.email || '',
                  line: user.line || '',
                  phone: user.phone || '',
                  password: '',
                  confirmPassword: ''
                });
                setView(user?.isSupplier && !user?.isAdmin && !user?.isStaff ? 'SUPPLIER_DEFECTS' : 'DASHBOARD');
              } catch (callbackError) {
                console.error('Login success handler failed:', callbackError);
                setAuthError(callbackError?.message || 'เกิดข้อผิดพลาดหลังจากเข้าสู่ระบบ');
              } finally {
                setAuthLoading(false);
              }
            })
            .withFailureHandler(err => {
              setAuthError(err.message || 'ไม่สามารถเข้าสู่ระบบได้');
              setAuthLoading(false);
            })
            .loginUser(authForm.userId, authForm.password);
          return;
        }

        google.script.run
          .withSuccessHandler(() => {
            setAuthLoading(false);
            alert('ลงทะเบียนสำเร็จ กรุณารอผู้ดูแลระบบอนุมัติสิทธิ์ก่อนเข้าใช้งาน');
            setAuthMode('LOGIN');
            setAuthForm({ userId: authForm.userId, password: '', confirmPassword: '', fullName: '', roleValue: '', email: '', line: '', phone: '' });
          })
          .withFailureHandler(err => {
            setAuthError(err.message || 'ไม่สามารถลงทะเบียนได้');
            setAuthLoading(false);
          })
          .registerUser({
            userId: authForm.userId,
            password: authForm.password,
            confirmPassword: authForm.confirmPassword,
            fullName: authForm.fullName,
            roleValue: authForm.roleValue,
            email: authForm.email,
            line: authForm.line,
            phone: authForm.phone
          });
      };

      const handleSaveProfile = () => {
        if (!currentUser?.userId) return;
        setIsSaving(true);
        google.script.run
          .withSuccessHandler(user => {
            sessionStorage.setItem('sas_user', JSON.stringify(user));
            setCurrentUser(user);
            setProfileForm({
              fullName: user.fullName || '',
              email: user.email || '',
              line: user.line || '',
              phone: user.phone || '',
              password: '',
              confirmPassword: ''
            });
            setIsSaving(false);
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูลโปรไฟล์: ' + err.message);
            setIsSaving(false);
          })
          .updateUserProfile(currentUser.userId, profileForm);
      };

      const handleDeleteManagedUser = (userId) => {
        if (!currentUser?.userId) return;

                jobId: job.id,
                site: job.site,
                ownerCompany: job.ownerCompany || '-',

                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Password</label>
                      <input type="password" value={profileForm.password} onChange={e => setProfileForm(prev => ({ ...prev, password: e.target.value }))} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brand-500" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Confirm Password</label>
                      <input type="password" value={profileForm.confirmPassword} onChange={e => setProfileForm(prev => ({ ...prev, confirmPassword: e.target.value }))} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brand-500" />

                  <div className="flex justify-end">

                <div className="space-y-6">
                  <div className="bg-white rounded-3xl border border-gray-100 shadow-sm p-6">
                    <div className="text-xs font-bold uppercase tracking-[0.18em] text-gray-400">Position Scope</div>

                      <div className="rounded-2xl bg-slate-50 border border-slate-100 px-4 py-3">
                        <div className="text-sm font-bold text-slate-900">Admin</div>
                        <div className="text-sm text-slate-500 mt-1">เข้าถึงทุกเมนูและบริหารผู้ใช้งานได้ครบทั้งหมด</div>
