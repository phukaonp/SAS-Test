           ]}
         ]},
         { id: 'JOB-CNX-002', site: 'โครงการ Sansiri', owner: 'คุณสมหญิง', ownerCompany: 'Sansiri PCL', staff: 'ณเดช', status: 'รอดำเนินการ', remark: '', tasks: []}
      ];

    // --- Mock Google Apps Script API ---
    if (typeof google === 'undefined') {
      window.google = {
        script: {
          run: new Proxy({}, {
            get: function(_, prop) {
              const handler = {
                success: null, failure: null,
                withSuccessHandler: function(cb) { this.success = cb; return new Proxy(this, proxyHandler); },
                withFailureHandler: function(cb) { this.failure = cb; return new Proxy(this, proxyHandler); }
              };
              const proxyHandler = {
                get: function(t, p) {
                  if (p in t) return typeof t[p] === 'function' ? t[p].bind(t) : t[p];
                  return function(...args) {
                    setTimeout(() => {
                      if (t.success) {
                        if (p === 'getAllData') {
                           t.success(JSON.stringify(window.sasMockDB));
                        }
                        else if (p === 'getMasterData') t.success(JSON.stringify({
                            sites: ['โครงการ Q House', 'โครงการ Sansiri'], 
                            owners: [{site: 'โครงการ Q House', owner: 'คุณสมชาย', ownerCompany: 'Q House PCL'}],
                            mainCategories: ['งานผนัง', 'งานฝ้าเพดาน', 'งานระบบไฟฟ้า', 'งานระบบประปา'],
                            subCategories: {
                              'งานผนัง': ['ก่ออิฐ/ฉาบปูน', 'งานสีรองพื้น', 'ผนังสำเร็จรูป'],
                              'งานฝ้าเพดาน': ['โครงคร่าว'],
                              'งานระบบไฟฟ้า': ['ตู้ Control', 'ท่อร้อยสาย', 'บล๊อคไฟ/Pool box', 'รางWireWay', 'สาย (G)', 'สาย (L)', 'สาย (N)'],
                              'งานระบบประปา': ['ท่อรั่ว', 'ก๊อกน้ำซึม']
                            }
                        }));
                        else if (p === 'loginUser') t.success({userId: args[0], fullName: 'ผู้ใช้งานระบบ (Mock)'});
                        else if (p === 'exportTaskPlansToPDF' || p === 'exportDefectReportToPDF') t.success(JSON.stringify([{taskId: 'MOCK-DOC', url: '#'}]));
                        else if (p === 'updateTaskStatusAndJob') {
                           let taskId = args[0];
                           let newStatus = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.status = newStatus;
                                 let allClosed = job.tasks.length > 0 && job.tasks.every(tk => tk.status === 'Closed');
                                 if (allClosed) job.status = 'Closed';
                                 else if (newStatus === 'Active' || job.status === 'Closed') job.status = 'Active';
                              }
                           });
                           t.success("Success");
                        }
                        else if (p === 'addDefect') {
                           let taskId = args[0];
                           let formData = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.defects = task.defects || [];
                                 task.defects.push({ id: `DEF-NEW-${Date.now()}`, ...formData, status: 'รอดำเนินการ' });
                              }
                           });
                           t.success("DEF-NEW");
                        }
                        else if (p === 'deleteDefect') {
                           window.sasMockDB.forEach(job => {
                              job.tasks.forEach(task => {
                                 if (task.defects) task.defects = task.defects.filter(d => d.id !== args[0]);
                              });
                           });
                           t.success("Success");
                        }
                        else {
                           t.success("Mock-Success");
                        }
                      }
                    }, 400);
                  };
                }
              };
              if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') return handler[prop].bind(handler);
              return proxyHandler.get(handler, prop);
            }
          })
        }
      };
    }

    };

    // --- Helper Components ---
    const Avatar = ({ name, size = "sm" }) => {
      const initials = name ? name.substring(0, 2).toUpperCase() : 'U';

        <div className={`rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white flex items-center justify-center font-bold border-2 border-white shadow-sm ${sizes[size]}`}>

    const StatusBadge = ({ status, size = 'sm' }) => {
      let colorClass = 'bg-gray-500 shadow-gray-500/40'; // Default
      
      if (status === 'Active') {
        colorClass = 'bg-blue-500 shadow-blue-500/40';
      } else if (status === 'Closed' || status === 'แก้ไขแล้ว' || status === 'เสร็จสิ้น') {
        colorClass = 'bg-emerald-500 shadow-emerald-500/40';
      } else if (status === 'รอดำเนินการ' || status === 'ยังไม่แก้ไข') {
        colorClass = 'bg-amber-500 shadow-amber-500/40';
      } else if (status === 'Reject') {
        colorClass = 'bg-rose-500 shadow-rose-500/40';
      }
      
      const paddingAndText = size === 'lg' ? 'px-4 py-1.5 text-sm' : 'px-3 py-1 text-xs';
      
      return (
        <span className={`${paddingAndText} font-bold rounded-full text-white shadow-md border-transparent ${colorClass} transition-all whitespace-nowrap`}>
          {status || 'ไม่มีสถานะ'}

      );
    };

    // --- Component จัดการรูปภาพ (วาด + ใส่ลายน้ำ พิกัด & เวลา) ---
    const ImageAnnotator = ({ imageSrc, field, onSave, onClose }) => {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [location, setLocation] = useState('กำลังหาพิกัด...');

      useEffect(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => setLocation(`Lat: ${pos.coords.latitude.toFixed(5)}, Lng: ${pos.coords.longitude.toFixed(5)}`),
            (err) => setLocation('Location: ไม่สามารถดึงพิกัดได้')
          );
        } else {
          setLocation('Location: ไม่รองรับการดึงพิกัด');
        }

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 1200;
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          
          ctx.drawImage(img, 0, 0, width, height);

          const timestamp = new Date().toLocaleString('th-TH');
          const watermarkText = `${timestamp} | ${location}`;
          
          ctx.font = `bold ${Math.max(16, width * 0.03)}px Sarabun, sans-serif`;
          ctx.fillStyle = 'yellow';
          ctx.strokeStyle = 'black';
          ctx.lineWidth = 3;
          ctx.textBaseline = 'bottom';
          ctx.textAlign = 'right';
          
          ctx.strokeText(watermarkText, width - 20, height - 20);
          ctx.fillText(watermarkText, width - 20, height - 20);
          
          ctx.strokeStyle = 'red';
          ctx.lineWidth = Math.max(3, width * 0.005);
          ctx.lineCap = 'round';
        };
        img.src = imageSrc;
      }, [imageSrc, location]);

      const startDrawing = (e) => { setIsDrawing(true); draw(e); };
      const finishDrawing = () => { setIsDrawing(false); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); };
      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const handleSave = () => {
        const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.8);
        onSave(field, dataUrl);
      };

      return (
        <div className="fixed inset-0 bg-gray-900/90 z-[60] flex flex-col items-center justify-center p-4">
          <div className="text-white mb-2 flex justify-between w-full max-w-2xl">
            <span className="font-bold">ใช้นิ้ววาดเพื่อเน้นจุด (Annotate)</span>
            <button onClick={onClose} className="text-red-400 hover:text-red-300"><Icons.X /></button>
          </div>
          <div className="relative border-2 border-gray-600 bg-gray-900 overflow-hidden w-full max-w-2xl" style={{ maxHeight: '70vh' }}>
            <canvas 
              ref={canvasRef}
              onMouseDown={startDrawing} onMouseUp={finishDrawing} onMouseMove={draw} onMouseLeave={finishDrawing}
              onTouchStart={startDrawing} onTouchEnd={finishDrawing} onTouchMove={draw}
              className="w-full h-auto touch-none cursor-crosshair"
            />
          </div>
          <div className="flex gap-4 mt-6 w-full max-w-2xl">
            <button onClick={onClose} className="flex-1 py-3 bg-gray-700 hover:bg-gray-600 transition-colors text-white rounded-xl font-bold">ยกเลิก</button>
            <button onClick={handleSave} className="flex-1 py-3 bg-brand-600 hover:bg-brand-500 transition-colors text-white rounded-xl font-bold flex items-center justify-center">
              <span className="mr-2"><Icons.CheckCircle/></span> ยืนยัน
            </button>
          </div>
        </div>
      );
    };

    // --- Component จัดการอัปโหลดรูป ---
    const DefectImagesUploader = ({ defect, taskStatus, onSuccess }) => {
      const [images, setImages] = useState({
        imgUnit: defect?.imgUnit || '',
        imgBefore: defect?.imgBefore || '',
        imgDuring: defect?.imgDuring || '',
        imgAfter: defect?.imgAfter || ''
      });
      const [uploadingField, setUploadingField] = useState(null);
      const [isSavingStatus, setIsSavingStatus] = useState(false);
      const [editingImage, setEditingImage] = useState(null);

      const isTaskActive = taskStatus === 'Active';
      const isTaskRejected = taskStatus === 'Reject';
      const isTaskClosed = taskStatus === 'Closed';
      const isDefectFixed = defect?.status === 'แก้ไขแล้ว';

      const handleFileChange = (field, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setEditingImage({ field: field, src: reader.result });
          reader.readAsDataURL(file);
        }
      };

      const handleAnnotatorSave = (field, dataUrl) => {
        setImages(prev => ({ ...prev, [field]: dataUrl }));
        setEditingImage(null);
      };

      const handleUploadSingle = (field) => {
        setUploadingField(field);
        google.script.run
          .withSuccessHandler(url => {
            setImages(prev => ({ ...prev, [field]: url }));
            setUploadingField(null);
            onSuccess();
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันรับรูป: ' + err.message);
            setUploadingField(null);
          })
          .uploadSingleDefectImage(defect?.id, field, images[field]);
      };

      const handleFinishDefect = () => {
        setIsSavingStatus(true);
        google.script.run
          .withSuccessHandler(() => {
            alert('เปลี่ยนสถานะ Defect เป็น "แก้ไขแล้ว" สำเร็จ');
            setIsSavingStatus(false);
            onSuccess(); 
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาด: ' + err.message);
            setIsSavingStatus(false);
          })
          .updateDefectStatus(defect?.id, 'แก้ไขแล้ว');
      };

      const ImageBox = ({ label, field, disabledReason }) => {
        const isDisabled = !!disabledReason;
        const currentImg = images[field];
        const isBase64 = currentImg && currentImg.startsWith('data:image');
        const isUploaded = currentImg && currentImg.startsWith('http');
        const isUploading = uploadingField === field;

        const getDirectImageUrl = (url) => {
          if (!url) return '';
          if (url.startsWith('data:image')) return url;
          const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
          if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
          return url;
        };

        return (
          <div className={`relative border rounded-2xl p-4 flex flex-col items-center justify-between shadow-sm transition-all ${isDisabled ? 'bg-gray-50 border-gray-200' : isBase64 ? 'bg-brand-50 border-brand-200' : 'bg-white border-gray-100 hover:border-brand-200'}`}>
            <h4 className="font-semibold text-gray-700 mb-3 text-sm text-center w-full pb-2 border-b border-gray-100">{label}</h4>
            
            <div className="flex-1 w-full flex flex-col items-center justify-center mb-4">
              {currentImg ? (
                <div className="relative group w-full flex justify-center">
                  <img src={getDirectImageUrl(currentImg)} alt={label} className={`h-32 object-cover rounded-xl border border-gray-200 shadow-sm ${isDisabled ? 'opacity-50' : ''}`} />
                  {isUploaded && (
                    <div className="absolute top-2 right-2 bg-gradient-to-br from-emerald-400 to-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center shadow-md border border-emerald-300">
                      <span className="mr-1"><Icons.CheckCircle/></span> บันทึกแล้ว
                    </div>
                  )}
                </div>
              ) : (
                <div className={`h-32 flex flex-col items-center justify-center w-full rounded-xl text-xs text-center p-4 border-2 border-dashed ${isDisabled ? 'text-gray-400 border-gray-200' : 'text-gray-400 border-gray-200 bg-gray-50'}`}>
                  <span className="mb-2 opacity-50"><Icons.File /></span>
                  {isDisabled ? disabledReason : 'ยังไม่มีรูปภาพ'}
                </div>
              )}
            </div>
            
            <div className="w-full flex flex-col gap-2">
              <input 
                type="file" accept="image/*" capture="environment" 
                onChange={(e) => handleFileChange(field, e)} 
                disabled={isDisabled || isTaskRejected || isDefectFixed || isTaskClosed} 
                className={`text-xs w-full disabled:opacity-50 cursor-pointer file:mr-2 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 transition-colors ${(isTaskRejected || isDefectFixed || isTaskClosed) ? 'hidden' : ''}`} 
              />
              
              {isBase64 && (
                <button
                  onClick={() => handleUploadSingle(field)}
                  disabled={isUploading}
                  className="w-full py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-xl shadow-md font-bold transition-colors flex justify-center items-center animate-pulse hover:animate-none"
                >
                  {isUploading ? 'กำลังบันทึก...' : 'คลิกเพื่อบันทึกรูปนี้'}
                </button>
              )}
            </div>
          </div>
        );
      };

      const allImagesUploadedAndSaved = 
        images.imgUnit && images.imgUnit.startsWith('http') &&
        images.imgBefore && images.imgBefore.startsWith('http') &&
        images.imgDuring && images.imgDuring.startsWith('http') &&
        images.imgAfter && images.imgAfter.startsWith('http');

      return (
        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 mt-6">
          {editingImage && <ImageAnnotator imageSrc={editingImage.src} field={editingImage.field} onSave={handleAnnotatorSave} onClose={() => setEditingImage(null)} />}

          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-3">
            <div>
              <h3 className="text-xl font-bold text-gray-800">จัดการรูปภาพ (4 รูป)</h3>
              <p className="text-sm text-gray-500 mt-1">อัปโหลดและบันทึกภาพให้ครบทั้ง 4 ขั้นตอนเพื่อจบงาน</p>
            </div>
            <div className="text-right">
              {!isTaskActive && !isTaskRejected && !isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-amber-50 to-yellow-100 text-amber-700 text-sm font-bold rounded-md border border-amber-200 shadow-sm">⚠️ ต้องเปิดใบงาน (Active) ก่อน</span>}
              {isTaskRejected && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-rose-50 to-red-100 text-rose-700 text-sm font-bold rounded-md border border-rose-200 shadow-sm">⚠️ ใบงานถูก Reject ไม่อนุญาต</span>}
              {isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-gray-50 to-slate-100 text-gray-600 text-sm font-bold rounded-md border border-gray-200 shadow-sm">🔒 ใบงานถูกปิดแล้ว</span>}
            </div>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
            <ImageBox label="1. เลขยูนิต" field="imgUnit" disabledReason={!isTaskActive && !images['imgUnit'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="2. ก่อนแก้ไข" field="imgBefore" disabledReason={isTaskRejected ? "ไม่อนุญาต" : null} />
            <ImageBox label="3. ระหว่างแก้ไข" field="imgDuring" disabledReason={!isTaskActive && !images['imgDuring'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="4. หลังแก้ไข" field="imgAfter" disabledReason={!isTaskActive && !images['imgAfter'] ? "เปิดใบงานก่อน" : null} />
          </div>
          
          <div className="mt-8 flex justify-end border-t border-gray-100 pt-6">
            <button 
              onClick={handleFinishDefect} 
              disabled={!allImagesUploadedAndSaved || isSavingStatus || isDefectFixed || isTaskClosed} 
              className={`px-8 py-3 text-white rounded-xl flex items-center font-bold text-sm transition-all ${
                isDefectFixed || isTaskClosed ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                : !allImagesUploadedAndSaved ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                : 'bg-emerald-600 hover:bg-emerald-700 shadow-md shadow-emerald-200 hover:-translate-y-0.5'
              }`}
            >
              {isSavingStatus ? 'กำลังอัปเดตระบบ...' : 
               isDefectFixed ? '✅ แก้ไขเสร็จสิ้นแล้ว' : 
               <><span className="mr-2"><Icons.CheckCircle/></span> ยืนยันแก้ไขเสร็จสิ้น</>}
            </button>
          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      // Auth State
      const [currentUser, setCurrentUser] = useState(() => {
        const savedUser = sessionStorage.getItem('sas_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [authMode, setAuthMode] = useState('LOGIN');
      const [authForm, setAuthForm] = useState({ userId: '', password: '', confirmPassword: '', position: '', email: '', line: '', phone: '' });
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState('');

      const [view, setView] = useState('JOB_LIST');
      const [jobs, setJobs] = useState([]);
      const [ownerMaster, setOwnerMaster] = useState([]);
      const [uniqueSites, setUniqueSites] = useState([]);
      
      const [mainCategories, setMainCategories] = useState([]);
      const [subCategoriesMap, setSubCategoriesMap] = useState({});

      const [isLoading, setIsLoading] = useState(true);
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false);
      const [isExportingPDF, setIsExportingPDF] = useState(false);
      const [pdfLinks, setPdfLinks] = useState([]);

      const [activeJobId, setActiveJobId] = useState(null);
      const [activeTaskId, setActiveTaskId] = useState(null);
      const [activeDefectId, setActiveDefectId] = useState(null);
      
      const [showJobForm, setShowJobForm] = useState(false);
      const [showTaskForm, setShowTaskForm] = useState(false);
      const [showDefectForm, setShowDefectForm] = useState(false);
      const [editingJob, setEditingJob] = useState(null);

      const fetchData = (softRefresh = false) => {
        if (softRefresh) {
          setIsRefreshing(true);
        } else {
          setIsLoading(true);
        }
        
        google.script.run
          .withSuccessHandler(data => { 
            setJobs(JSON.parse(data)); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .withFailureHandler(err => { 
            console.error(err); 
            alert('เกิดข้อผิดพลาดในการโหลดข้อมูล'); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .getAllData();
      };
      
      const fetchMasterData = () => {
        google.script.run
          .withSuccessHandler(data => { 
            const parsed = JSON.parse(data); 
            setOwnerMaster(parsed.owners); 
            setUniqueSites(parsed.sites); 
            setMainCategories(parsed.mainCategories || []);
            setSubCategoriesMap(parsed.subCategories || {});
          })
          .withFailureHandler(err => console.error('Error fetching master data:', err))
          .getMasterData(); 
      };

      useEffect(() => {
        fetchData();
        fetchMasterData();
      }, []);

      const handleRefreshData = () => {
        fetchData(true);
        fetchMasterData();
      };

      const handleLogout = () => {
        sessionStorage.removeItem('sas_user');
        setCurrentUser(null);
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const activeTask = activeJob?.tasks?.find(t => t.id === activeTaskId);
      const activeDefect = activeTask?.defects?.find(d => d.id === activeDefectId);

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);

        if (authMode === 'REGISTER') {
          if (!authForm.userId || !authForm.password || !authForm.position) {
            setAuthError('กรุณากรอกข้อมูลที่มีเครื่องหมาย * ให้ครบถ้วน'); setAuthLoading(false); return;
          }
          if (authForm.password !== authForm.confirmPassword) {
            setAuthError('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน'); setAuthLoading(false); return;
          }
          google.script.run
            .withSuccessHandler(() => {
              alert('สมัครสมาชิกสำเร็จ กรุณาเข้าสู่ระบบ');
              setAuthMode('LOGIN'); setAuthForm({ userId: '', password: '', confirmPassword: '', position: '', email: '', line: '', phone: '' }); setAuthLoading(false);
            })
            .withFailureHandler(err => { setAuthError(err.message); setAuthLoading(false); })
            .registerUser(authForm);
        } else {
          if (!authForm.userId || !authForm.password) {
            setAuthError('กรุณากรอก User ID และ รหัสผ่าน'); setAuthLoading(false); return;
          }
          google.script.run
            .withSuccessHandler((user) => { 
              sessionStorage.setItem('sas_user', JSON.stringify(user));
              setCurrentUser(user); 
              setAuthLoading(false); 
            })
            .withFailureHandler(err => { setAuthError(err.message); setAuthLoading(false); })
            .loginUser(authForm.userId, authForm.password);
        }
      };

      // --- CRUD Functions ---
      const handleCreateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .addJob(formData);
      };
      
      const handleUpdateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setEditingJob(null); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .updateJob(formData);
      };

      const handleDeleteJob = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานหลัก ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeJobId === id) setView('JOB_LIST'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteJob(id);
        }
      };
      
      const handleCreateTask = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowTaskForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addTask(activeJobId, formData);
      };

      const handleDeleteTask = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานย่อย ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeTaskId === id) setView('JOB_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteTask(id);
        }
      };
      
      const handleCreateDefect = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowDefectForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addDefect(activeTaskId, formData);
      };

      const handleDeleteDefect = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบรายการ Defect ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeDefectId === id) setView('TASK_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteDefect(id);
        }
      };

      const handleUpdateTaskStatus = (id, status) => {
        if (window.confirm(`⚠️ ยืนยันการเปลี่ยนสถานะเป็น "${status}" ใช่หรือไม่?`)) {
          setIsSaving(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsSaving(false); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).updateTaskStatusAndJob(id, status);
        }
      };

      const handleExportTaskPlans = () => {
        if (!activeJob?.tasks || activeJob.tasks.length === 0) return alert('ไม่มีใบงานย่อยให้ Export');
        setIsExportingPDF(true);
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks(JSON.parse(res)); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportTaskPlansToPDF(activeJobId);
      };

      const handleExportDefectReport = (taskId, e) => {
        e.stopPropagation();
        setIsExportingPDF(true); 
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks([JSON.parse(res)]); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportDefectReportToPDF(taskId);
      };

      // --- Modals ---
      const JobModal = () => {
        const isEditMode = !!editingJob;
        const [formData, setFormData] = useState({ 
          id: editingJob ? editingJob.id : '',
          site: editingJob ? editingJob.site : (uniqueSites[0] || ''), 
          owner: editingJob ? editingJob.owner : '', 
          ownerCompany: editingJob ? editingJob.ownerCompany : '', 
          staff: editingJob ? editingJob.staff : STAFFS[2], 
          replyDueDate: editingJob ? editingJob.replyDueDate : '', 
          remark: editingJob ? editingJob.remark : '' 
        });
        
        useEffect(() => {
          if (!isEditMode && uniqueSites.length > 0 && formData.site === uniqueSites[0] && formData.owner === '') {
            const defaultOwners = ownerMaster.filter(m => m.site === uniqueSites[0]);
            if (defaultOwners.length > 0) setFormData(prev => ({...prev, owner: defaultOwners[0].owner, ownerCompany: defaultOwners[0].ownerCompany}));
          }
        }, [uniqueSites, ownerMaster, isEditMode]);
        
        const availableOwners = ownerMaster.filter(m => m.site === formData.site);
        const uniqueOwnersList = [...new Set(availableOwners.map(m => m.owner))];
        
        const handleSiteChange = (e) => {
          const newSite = e.target.value;
          const filtered = ownerMaster.filter(m => m.site === newSite);
          setFormData({...formData, site: newSite, owner: filtered[0]?.owner || '', ownerCompany: filtered[0]?.ownerCompany || ''});
        };
        const handleOwnerChange = (e) => {
          const newOwner = e.target.value;
          const matched = ownerMaster.find(m => m.site === formData.site && m.owner === newOwner);
          setFormData({...formData, owner: newOwner, ownerCompany: matched ? matched.ownerCompany : ''});
        };
        const handleClose = () => { setShowJobForm(false); setEditingJob(null); };
        const handleSubmit = () => {
          if (isEditMode) { if (window.confirm('ยืนยันบันทึกการแก้ไข?')) handleUpdateJob(formData); } 
          else handleCreateJob(formData);
        };

        return (
          <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
              <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 className="text-lg font-bold text-gray-800">{isEditMode ? `แก้ไขใบงานหลัก: ${formData.id}` : 'Create New Project'}</h2>
                <button onClick={handleClose} className="text-gray-400 hover:text-gray-700 bg-white rounded-full p-1 shadow-sm"><Icons.X /></button>
              </div>
              <div className="p-6 space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Site Location *</label>
                  <select className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none" value={formData.site} onChange={handleSiteChange}>
                    {uniqueSites.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Owner *</label>
                    <select className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none" value={formData.owner} onChange={handleOwnerChange}>
                      {uniqueOwnersList.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Company</label>
                    <input type="text" className="w-full bg-gray-100 border border-gray-200 rounded-xl p-3 text-sm text-gray-500" value={formData.ownerCompany} readOnly />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Assign Staff *</label>
                  <select className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none" value={formData.staff} onChange={e => setFormData({...formData, staff: e.target.value})}>
                    {STAFFS.map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Due Date</label>
                  <input type="date" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:border-brand-500 outline-none" value={formData.replyDueDate} onChange={e => setFormData({...formData, replyDueDate: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Remark</label>
                  <textarea className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:border-brand-500 outline-none" rows="2" value={formData.remark} onChange={e => setFormData({...formData, remark: e.target.value})}></textarea>
                </div>
              </div>
              <div className="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button onClick={handleClose} className="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-200 transition-colors">Cancel</button>
                <button onClick={handleSubmit} disabled={isSaving} className="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-brand-500 to-brand-600 shadow-md shadow-brand-200 hover:-translate-y-0.5 transition-all disabled:opacity-70">
                  {isSaving ? 'Saving...' : (isEditMode ? 'Update Project' : 'Create Project')}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const TaskModal = () => {
        const [formData, setFormData] = useState({ scope: 'SAS', building: '', unit: '', customerName: '', targetFixDate: '', remark: '' });
        return (
          <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
              <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 className="text-lg font-bold text-gray-800">Add Task</h2>

      const DefectModal = () => {
        const isVO = activeTask?.scope === 'VO';
        
        // Helper ในการดึง Sub Category โดยอ้างอิงจาก Main Category
        const getSubsForCategory = (mainCat) => {
          if (!mainCat || !subCategoriesMap) return [];
          const target = mainCat.trim();
          for (const key in subCategoriesMap) {
             if (key.trim() === target) return subCategoriesMap[key];
          }
          return [];
        };

        const defaultMain = mainCategories.length > 0 ? mainCategories[0] : '';
        const defaultSubList = getSubsForCategory(defaultMain);
        const defaultSub = defaultSubList.length > 0 ? defaultSubList[0] : '';

        const [formData, setFormData] = useState({ 
          mainCategory: defaultMain, 
          subCategory: defaultSub, 
          description: '', 
          major: 'ไม่ใช่', 
          team: TEAMS[0], 
          voSteps: '', 
          imgBefore: '',
          targetStartDate: '',
          targetEndDate: ''
        });

        useEffect(() => {
          if (!formData.mainCategory && mainCategories.length > 0) {
             const initialMain = mainCategories[0];
             const initialSubList = getSubsForCategory(initialMain);
             setFormData(prev => ({
               ...prev, 
               mainCategory: initialMain, 
               subCategory: initialSubList.length > 0 ? initialSubList[0] : ''
             }));
          }
        }, [mainCategories, subCategoriesMap]);
        
        const handleMainCatChange = (e) => {
          const main = e.target.value;
          const subs = getSubsForCategory(main);
          setFormData({
            ...formData, 
            mainCategory: main, 
            subCategory: subs.length > 0 ? subs[0] : ''
          });
        };

        const handleDateChange = (e) => {
          const startDateStr = e.target.value;
          if (!startDateStr) {
            setFormData({...formData, targetStartDate: '', targetEndDate: ''});
            return;
          }
          
          const startDate = new Date(startDateStr);
          startDate.setDate(startDate.getDate() + 14); // บวกเพิ่ม 14 วัน
          
          const year = startDate.getFullYear();
          const month = String(startDate.getMonth() + 1).padStart(2, '0');
          const day = String(startDate.getDate()).padStart(2, '0');
          const endDateStr = `${year}-${month}-${day}`;
          
          setFormData({...formData, targetStartDate: startDateStr, targetEndDate: endDateStr});
        };

        const handleSave = () => {
          if (!formData.targetStartDate) return alert('กรุณาระบุ วันเข้าแก้ไข');
          if (!formData.description.trim()) return alert('กรุณากรอกรายละเอียด Description');
          if (!formData.subCategory) return alert('กรุณาเลือก Sub Category');
          if (isVO && !formData.voSteps.trim()) return alert('กรุณาระบุ ขั้นตอนการแก้ไข (สำหรับงาน VO)');
          
          handleCreateDefect(formData);
        };
        
        // เช็คว่ากรอกครบทุกช่องที่บังคับแล้วหรือยัง เพื่อปลดล็อคปุ่ม Save
        const isFormValid = formData.mainCategory && formData.subCategory && formData.team && formData.targetStartDate && formData.description.trim() && (!isVO || formData.voSteps.trim());
        
        return (
          <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
              {/* Header */}
              <div className="px-6 py-4 flex justify-between items-center border-b border-gray-100 shrink-0">
                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                  <span className="text-gray-500"><Icons.Plus /></span> Add Defect
                </h2>
                <button onClick={() => setShowDefectForm(false)} className="text-gray-400 hover:text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-full p-1.5 transition-colors"><Icons.X /></button>
              </div>

              {/* Body */}
              <div className="p-6 overflow-y-auto space-y-5">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">CATEGORY *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.mainCategory} onChange={handleMainCatChange} required>
                      {mainCategories.length > 0 ? mainCategories.map(c => <option key={c} value={c}>{c}</option>) : <option value="">- ไม่มีข้อมูล -</option>}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">SUB CATEGORY *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.subCategory} onChange={e => setFormData({...formData, subCategory: e.target.value})} required>
                      {getSubsForCategory(formData.mainCategory).length > 0 ? (
                        getSubsForCategory(formData.mainCategory).map(c => <option key={c} value={c}>{c}</option>)
                      ) : (
                        <option value="" disabled>- ไม่พบข้อมูลหมวดหมู่รอง -</option>
                      )}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">TEAM *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.team} onChange={e => setFormData({...formData, team: e.target.value})} required>
                      {TEAMS.map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">MAJOR ISSUE? *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.major} onChange={e => setFormData({...formData, major: e.target.value})} required>
                      <option value="ไม่ใช่">ไม่ใช่</option>
                      <option value="ใช่">ใช่</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">วันเข้าแก้ไข *</label>
                    <input type="date" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2 px-3 border outline-none" value={formData.targetStartDate} onChange={handleDateChange} required />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">วันแก้ไขเสร็จสิ้น *</label>
                    <input type="date" className="block w-full rounded-md border-gray-200 bg-gray-50 text-gray-500 shadow-sm text-sm py-2 px-3 border outline-none cursor-not-allowed" value={formData.targetEndDate} readOnly />
                  </div>
                </div>
                
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">DESCRIPTION *</label>
                  <textarea className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-3 px-3 border outline-none" rows="4" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required></textarea>
                </div>

                {/* Upload Area */}
                <div className="border border-gray-200 rounded-xl p-4 bg-gray-50/30">
                   <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">UPLOAD INITIAL PHOTO (OPTIONAL)</label>
                   <div className="flex items-center gap-4">
                      {formData.imgBefore ? (
                         <div className="relative">
                            <img src={formData.imgBefore} alt="Preview" className="h-20 w-20 object-cover rounded-md border border-gray-200 shadow-sm" />
                            <button onClick={() => setFormData({...formData, imgBefore: ''})} className="absolute -top-2 -right-2 bg-white rounded-full p-0.5 shadow-md border border-gray-100 text-gray-500 hover:text-red-500"><Icons.X/></button>
                         </div>
                      ) : (
                        <div className="relative group w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400 bg-white hover:bg-brand-50 hover:border-brand-300 transition-colors cursor-pointer overflow-hidden">
                          <Icons.File />
                          <input type="file" accept="image/*" onChange={(e) => {
                               const file = e.target.files[0];
                               if (file) { const reader = new FileReader(); reader.onloadend = () => setFormData(prev => ({...prev, imgBefore: reader.result})); reader.readAsDataURL(file); }
                            }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                        </div>
                      )}
                      <div className="flex flex-col items-start justify-center">
                         {formData.imgBefore ? (
                           <span className="text-sm text-gray-600 font-medium">เลือกรูปภาพแล้ว</span>
                         ) : (
                           <div className="flex items-center gap-2">
                             <span className="text-sm text-brand-600 font-semibold px-3 py-1.5 bg-white border border-gray-100 rounded-md shadow-sm pointer-events-none">เลือกไฟล์</span>
                             <span className="text-sm text-gray-500">ไม่ได้เลือกไฟล์ใด</span>
                           </div>
                         )}
                      </div>
                   </div>
                </div>
                
                {isVO && (
                  <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 mt-2">
                    <label className="block text-xs font-bold text-purple-800 uppercase tracking-wide mb-1.5">ขั้นตอนการแก้ไข (เฉพาะงาน VO) *</label>
                    <textarea className="block w-full rounded-md border-purple-200 shadow-sm focus:border-purple-500 focus:ring-purple-500 text-sm py-2 px-3 border outline-none" rows="2" placeholder="ระบุขั้นตอนการทำงานเพื่อประเมิน BOQ..." value={formData.voSteps} onChange={e => setFormData({...formData, voSteps: e.target.value})} required></textarea>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="px-6 py-4 border-t border-gray-100 flex justify-end items-center gap-4 shrink-0 bg-gray-50/50 rounded-b-2xl">
                <button onClick={() => setShowDefectForm(false)} className="text-sm font-bold text-gray-600 hover:text-gray-900 transition-colors">Cancel</button>
                <button 
                  onClick={handleSave} 
                  disabled={isSaving || !isFormValid} 
                  className={`px-6 py-2.5 rounded-lg text-sm font-bold text-white transition-all ${(isSaving || !isFormValid) ? 'bg-gray-400 opacity-70 cursor-not-allowed' : 'bg-brand-500 hover:bg-brand-600 shadow-md shadow-brand-200 hover:-translate-y-0.5'}`}>
                  {isSaving ? 'Saving...' : 'Save Defect'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // --- Main Views (Moved up to avoid ReferenceError from early returns) ---
      const Sidebar = ({ onLogout }) => (
        <aside className="w-20 lg:w-64 bg-gradient-to-b from-brand-800 to-brand-950 text-white flex flex-col h-screen transition-all duration-300 z-20 shadow-xl flex-shrink-0">
          <div className="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-white/10">
            <Icons.Logo />
            <span className="hidden lg:block ml-3 font-bold text-xl tracking-tight">Upstream</span>
          </div>
          <nav className="flex-1 py-6 flex flex-col gap-2 px-3">
            {[
              { icon: Icons.Grid, label: 'Dashboard', active: view === 'JOB_LIST' },
              { icon: Icons.Calendar, label: 'Tasks & Defects', active: view === 'JOB_DETAIL' || view === 'TASK_DETAIL' || view === 'DEFECT_DETAIL' },
            ].map((item, idx) => (
              <button key={idx} onClick={() => item.label === 'Dashboard' ? setView('JOB_LIST') : null} 
                className={`flex items-center p-3 rounded-xl transition-all ${item.active ? 'bg-white/20 text-white shadow-inner' : 'text-brand-100 hover:bg-white/10 hover:text-white'}`}>
                <div className={`${item.active ? 'text-brand-300' : ''}`}><Icons.Grid /></div>
                <span className="hidden lg:block ml-4 font-medium">{item.label}</span>
              </button>
            ))}
          </nav>
          <div className="p-4 border-t border-white/10 hidden lg:flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-xl transition-colors" onClick={onLogout}>
             <Avatar name={currentUser?.fullName} />
             <div className="flex-1 overflow-hidden">
                <div className="text-sm font-bold truncate">{currentUser?.fullName}</div>
                <div className="text-xs text-brand-200 truncate">Sign Out</div>
             </div>
          </div>
        </aside>
      );

      const TopHeader = ({ onRefresh, isRefreshing, onLogout }) => (
        <header className="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-6 z-10 sticky top-0">
          <div className="flex-1 max-w-xl flex items-center bg-gray-50 rounded-full px-4 py-2.5 border border-gray-200 focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-100 transition-all">
            <span className="text-gray-400"><Icons.Search /></span>
            <input type="text" placeholder="Search projects, tasks, or ID..." className="bg-transparent border-none outline-none w-full ml-3 text-sm placeholder-gray-400" />
          </div>
          <div className="flex items-center gap-2 sm:gap-4 ml-4">
            <button onClick={onRefresh} disabled={isRefreshing} className="relative p-2 text-gray-500 hover:text-brand-600 hover:bg-brand-50 rounded-full transition-all disabled:opacity-50" title="Refresh Data">
              <Icons.Refresh className={isRefreshing ? "animate-spin text-brand-600" : ""} />
            </button>
            <button className="relative p-2 text-gray-400 hover:text-brand-600 transition-colors hidden sm:block">
              <Icons.Bell />
              <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border border-white"></span>
            </button>
            <div className="lg:hidden cursor-pointer" onClick={onLogout}><Avatar name={currentUser?.fullName} /></div>
          </div>
        </header>

      const HeroBanner = ({ title, subtitle, badges, info, onBack }) => (
        <div className="relative rounded-3xl overflow-hidden mb-8 shadow-sm border border-gray-100 bg-white">

             <div className="absolute inset-0 hero-overlay"></div>
          </div>
          <div className="absolute top-0 left-0 w-full h-full p-6 md:p-8 flex flex-col justify-between">
            <div className="text-brand-100 text-sm font-medium flex items-center gap-2">
              {onBack && <button onClick={onBack} className="hover:text-white flex items-center bg-black/20 px-2 py-1 rounded-lg backdrop-blur-sm mr-2 transition-colors"><Icons.ChevronLeft /> Back</button>}
              <span>Upstream System</span> <span className="opacity-50">/</span> <span>{subtitle}</span>
            </div>
          </div>
          <div className="relative mx-6 md:mx-8 -mt-20 md:-mt-24 bg-white rounded-2xl shadow-lg border border-gray-100 p-6 z-10 mb-6 flex flex-col md:flex-row gap-6 justify-between items-start md:items-center">
             <div>

                  <div key={i} className={i !== 0 ? 'pl-8' : ''}>

        <div className="flex gap-8 border-b border-gray-200 px-2 mb-6 overflow-x-auto no-scrollbar">

            <button key={tab} className={`pb-4 text-sm font-semibold whitespace-nowrap transition-all border-b-2 ${activeTab === tab ? 'border-brand-500 text-brand-700' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>{tab}</button>

      const JobList = () => (
        <div className="p-6 md:p-8 max-w-7xl mx-auto w-full">
          <HeroBanner 
            title="All Construction Projects" subtitle="OVERVIEW" badges={['Active']}
            info={[{ value: jobs.length, label: 'Total Projects' }, { value: jobs.filter(j=>j.status==='Active').length, label: 'Active Jobs' }]}
          />
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-lg font-bold text-gray-800">Ongoing Jobs</h2>
            <button onClick={() => { setEditingJob(null); setShowJobForm(true); }} className="bg-gradient-to-r from-brand-500 to-brand-600 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center shadow-md shadow-brand-200 transition-all hover:-translate-y-0.5">

                    <StatusBadge status={job.status} size="lg" />

              </button>
            </div>
            <button onClick={() => setShowTaskForm(true)} className="bg-gradient-to-r from-brand-500 to-brand-600 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center shadow-md shadow-brand-200 transition-all hover:-translate-y-0.5">
              <span className="mr-1"><Icons.Plus /></span> Add Task
            </button>
          </div>

          <div className="space-y-3 pb-10">
            {activeJob?.tasks?.map(task => (
              <div key={task.id} onClick={() => { setActiveTaskId(task.id); setView('TASK_DETAIL'); }} 
                className="bg-white p-4 sm:p-5 rounded-2xl border border-gray-100 shadow-sm hover:border-brand-300 hover:shadow-md transition-all cursor-pointer flex items-center gap-4 group">
                
                {/* Scope Badge (Left) */}
                <div className="shrink-0 flex flex-col justify-center">
                  <span className={`px-2.5 py-1 text-[11px] font-bold rounded-md border shadow-sm ${
                    task.scope === 'SAS' 
                      ? 'bg-blue-50 text-blue-700 border-blue-200' 
                      : 'bg-purple-50 text-purple-700 border-purple-200'
                  }`}>
                    {task.scope}
                  </span>
                </div>

                {/* Main Content */}
                <div className="flex-1 min-w-0 flex flex-col justify-center border-l border-gray-100 pl-4">
                  <h4 className="text-base sm:text-lg font-bold text-gray-900 truncate mb-1">
                    {task.customerName || '- ไม่ระบุชื่อลูกค้า -'}
                  </h4>
                  <div className="flex flex-wrap items-center gap-x-3 gap-y-2 text-xs sm:text-sm text-gray-500 mt-1">
                    <StatusBadge status={task.status} />
                    <span className="font-semibold text-gray-700 ml-1">อาคาร {task.building} - Unit {task.unit}</span>
                    <span className="hidden sm:inline text-gray-300">|</span>
                    <span>Defects: <strong className="text-gray-700">{task.defects?.length || 0}</strong></span>
                    <span className="hidden sm:inline text-gray-300">|</span>
                    <span>Target Date: <strong className="text-gray-700">{task.targetFixDate || 'N/A'}</strong></span>
                  </div>
                </div>

                {/* Right Actions */}
                <div className="shrink-0 flex items-center gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity ml-auto">
                  {task.status === 'Closed' && (
                    <button onClick={(e) => handleExportDefectReport(task.id, e)} className="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100 transition-colors" title="Export PDF">
                      <Icons.Download />
                    </button>
                  )}
                  <button onClick={(e) => handleDeleteTask(task.id, e)} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors" title="ลบใบงานย่อย">
                    <Icons.Trash />
                  </button>
                </div>
              </div>
            ))}
            {(!activeJob?.tasks || activeJob.tasks.length === 0) && <div className="text-center py-12 bg-white rounded-2xl border border-dashed border-gray-200 text-gray-400">No tasks found. Click "Add Task" to start.</div>}
          </div>
        </div>
      );

      const TaskDetail = () => {
        if (!activeTask) return null;
        
        return (
          <div className="p-6 md:p-8 max-w-7xl mx-auto w-full flex flex-col h-full">
            <HeroBanner 
              title={`Unit ${activeTask?.unit} (${activeTask?.building})`} subtitle={activeTask?.id} badges={[activeTask?.status, activeTask?.scope]} onBack={() => setView('JOB_DETAIL')}
              info={[{ value: activeTask?.defects?.length || 0, label: 'Total Defects' }, { value: activeTask?.customerName || 'N/A', label: 'Customer' }]}
            />
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
               <div className="flex gap-2 w-full md:w-auto">
                  {(activeTask?.status === 'รอดำเนินการ' || !activeTask?.status) && <button onClick={() => handleUpdateTaskStatus(activeTask.id, 'Active')} className="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-xl text-sm font-semibold flex-1 md:flex-none">Set Active</button>}
                  {activeTask?.status === 'Active' && <button onClick={() => handleUpdateTaskStatus(activeTask.id, 'Closed')} disabled={!(activeTask?.defects?.length > 0 && activeTask.defects.every(d => d.status === 'แก้ไขแล้ว'))} className={`px-4 py-2 rounded-xl text-sm font-bold text-white flex-1 md:flex-none ${(activeTask?.defects?.length > 0 && activeTask.defects.every(d => d.status === 'แก้ไขแล้ว')) ? 'bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 shadow-sm' : 'bg-gray-300 cursor-not-allowed'}`}>Close Task</button>}
               </div>
               <button onClick={() => setShowDefectForm(true)} disabled={activeTask?.status === 'Reject' || activeTask?.status === 'Closed'} className={`px-4 py-2 rounded-xl text-sm font-bold flex items-center w-full md:w-auto justify-center ${(activeTask?.status === 'Reject' || activeTask?.status === 'Closed') ? 'bg-gray-100 text-gray-400' : 'bg-gradient-to-r from-red-500 to-rose-600 text-white hover:from-red-600 hover:to-rose-700 shadow-md'}`}><Icons.Plus /> Add Defect</button>
            </div>

            {/* List View แบบใหม่สำหรับ Defect */}
            <div className="flex flex-col gap-4 pb-10">
              {activeTask?.defects?.map(defect => (
                <div 
                  key={defect.id} 
                  onClick={() => { setActiveDefectId(defect.id); setView('DEFECT_DETAIL'); }} 
                  className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm hover:border-brand-300 hover:shadow-md transition-all cursor-pointer group flex flex-col relative"
                >
                  {/* Status Row */}
                  <div className="flex justify-between items-start mb-4">
                     <div className="flex items-center gap-3">
                        <StatusBadge status={defect.status} size="lg" />
                     </div>
                     <div className="flex items-center gap-2">
                        {defect.major === 'ใช่' && <span className="bg-gradient-to-br from-rose-50 to-red-100 text-rose-700 text-[10px] font-bold px-2 py-1 rounded border border-rose-200">MAJOR</span>}
                        {activeTask?.status !== 'Closed' && (
                          <button 
                            onClick={(e) => handleDeleteDefect(defect.id, e)} 
                            className="text-gray-300 hover:text-red-500 p-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity"
                            title="ลบ Defect"
                          >
                            <Icons.Trash />
                          </button>
                        )}
                     </div>
                  </div>

                  {/* Details Row (Description most prominent) */}
                  <div className="mb-4">
                     <h4 className="text-lg md:text-xl font-bold text-gray-900 leading-snug mb-2">{defect.description}</h4>
                     <div className="text-sm font-semibold text-gray-700">
                        {defect.mainCategory} <span className="text-gray-400 font-normal mx-1">/</span> {defect.subCategory}
                     </div>
                  </div>
                  
                  {/* Footer Row */}
                  <div className="text-xs text-gray-500 pt-3 border-t border-gray-50 flex justify-between items-center mt-auto">
                     <span className="flex items-center gap-1.5"><Icons.User className="w-4 h-4" /> Team: {defect.team}</span>
                     <span className="text-gray-300 font-medium">ID: {defect.id.split('-').pop()}</span>
                  </div>
                </div>
              ))}
              {(!activeTask?.defects || activeTask.defects.length === 0) && (
                <div className="py-12 text-center text-gray-400 bg-white border border-dashed border-gray-200 rounded-3xl">
                  ยังไม่มีรายการ Defect ในใบงานนี้
                </div>
              )}
            </div>
          </div>
        );
      };

      const DefectDetail = () => {
        if (!activeDefect) return null;
        
        return (
          <div className="w-full flex flex-col h-full bg-gray-50 relative">
            {/* Sticky Header */}
            <div className="sticky top-0 z-40 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-200 px-4 md:px-8 py-5 flex-shrink-0 w-full">
               <div className="max-w-7xl mx-auto w-full">
                 {/* Breadcrumb */}
                 <div className="flex items-center text-sm text-gray-500 flex-wrap gap-y-2 mb-4">
                    <button onClick={() => setView('JOB_LIST')} className="hover:text-blue-600 flex items-center transition-colors"><span className="mr-1.5"><Icons.Home/></span></button>
                    <span className="mx-1 text-gray-300"><Icons.ChevronLeft className="rotate-180" /></span>
                    <button onClick={() => setView('JOB_DETAIL')} className="hover:text-blue-600 font-medium transition-colors px-2 py-1 hover:bg-gray-50 rounded">{activeJob?.id}</button>
                    <span className="mx-1 text-gray-300"><Icons.ChevronLeft className="rotate-180" /></span>
                    <button onClick={() => setView('TASK_DETAIL')} className="hover:text-blue-600 font-medium transition-colors px-2 py-1 hover:bg-gray-50 rounded">{activeTask?.id}</button>
                    <span className="mx-1 text-gray-300"><Icons.ChevronLeft className="rotate-180" /></span>
                    <span className="font-bold text-gray-800 bg-gray-100 px-2.5 py-1 rounded-md">{activeDefect?.id}</span>
                 </div>

                 {/* Title & Badge */}
                 <div className="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-5">
                    <div>
                      <h2 className="text-2xl font-bold text-gray-800 mb-2">ข้อมูล Defect: {activeDefect?.id.split('-').pop()}</h2>
                      <div className="flex items-center text-sm text-gray-600 gap-3 font-medium">
                        <span className={`px-2 py-0.5 rounded border text-xs font-bold ${activeTask?.scope === 'SAS' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-purple-50 text-purple-700 border-purple-200'}`}>{activeTask?.scope}</span>
                        <span>อาคาร {activeTask?.building} - Unit {activeTask?.unit}</span>
                        <span className="text-gray-300">|</span>
                        <span className="flex items-center"><span className="opacity-70 mr-1 flex items-center"><Icons.User className="w-4 h-4" /></span> {activeTask?.customerName || 'ไม่ระบุชื่อ'}</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      {activeDefect?.major === 'ใช่' && <span className="bg-gradient-to-br from-rose-50 to-red-100 text-rose-700 text-xs font-bold px-3 py-1.5 rounded-full border border-rose-200 shadow-sm">MAJOR ISSUE</span>}
                      <StatusBadge status={activeDefect?.status} size="lg" />
                    </div>
                 </div>

                 {/* Data Grid */}
                 <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50 rounded-xl p-4 border border-gray-100">
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">ลักษณะงาน</span>
                      <span className="text-sm font-bold text-gray-800 truncate" title={`${activeDefect?.mainCategory} / ${activeDefect?.subCategory}`}>{activeDefect?.mainCategory} <span className="text-gray-300 font-normal mx-0.5">/</span> {activeDefect?.subCategory}</span>
                    </div>
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">ทีมเข้าแก้ไข</span>
                      <span className="text-sm font-bold text-gray-800 truncate" title={activeDefect?.team}>{activeDefect?.team}</span>
                    </div>
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">วันเข้าแก้ไข</span>
                      <span className="text-sm font-bold text-gray-800">{activeDefect?.targetStartDate || '-'}</span>
                    </div>
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">วันแก้ไขเสร็จสิ้น</span>
                      <span className="text-sm font-bold text-gray-800">{activeDefect?.targetEndDate || '-'}</span>
                    </div>
                 </div>
               </div>
            </div>

            {/* Content Body */}
            <div className="p-4 md:p-8 max-w-7xl mx-auto w-full flex-shrink-0 flex-1">
               {/* Description */}
               <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                 <div className="bg-gradient-to-r from-brand-50 to-white px-6 py-4 border-b border-brand-100 flex items-center gap-2">
                    <svg className="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h3 className="text-lg font-bold text-brand-800">รายละเอียดปัญหา (Issue Description)</h3>
                 </div>
                 <div className="p-6">
                    <p className="text-gray-800 text-base leading-relaxed whitespace-pre-line break-words font-medium bg-brand-50/50 p-6 rounded-xl border border-brand-100 shadow-inner">
                      {activeDefect?.description || '- ไม่มีการระบุรายละเอียด -'}
                    </p>
                    
                    {/* Render VO Steps if available */}
                    {activeDefect?.voSteps && (
                       <div className="mt-4 pt-4 border-t border-gray-100">
                          <h4 className="text-sm font-bold text-purple-700 mb-2">ขั้นตอนการแก้ไข (VO)</h4>
                          <p className="text-gray-700 text-sm whitespace-pre-line bg-purple-50 p-4 rounded-lg border border-purple-100">{activeDefect?.voSteps}</p>
                       </div>
                    )}
                 </div>
               </div>

               {/* Images */}
               <DefectImagesUploader defect={activeDefect} taskStatus={activeTask?.status} onSuccess={() => fetchData(true)} />
            </div>
          </div>
        );
      };

      // --- Pre-Login View ---
      if (!currentUser) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full hero-pattern opacity-10"></div>
            <div className="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
              <div className="flex justify-center text-brand-600 mb-4"><div className="bg-white p-3 rounded-2xl shadow-sm"><Icons.Logo /></div></div>
              <h2 className="text-center text-3xl font-extrabold text-gray-900">{authMode === 'LOGIN' ? 'Welcome Back' : 'Create Account'}</h2>
              <p className="mt-2 text-center text-sm text-gray-500">SAS Defect Management System</p>
            </div>
            <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
              <div className="bg-white py-8 px-4 shadow-xl shadow-brand-100/50 sm:rounded-3xl border border-gray-100 sm:px-10">
                <form className="space-y-5" onSubmit={handleAuthSubmit}>
                  {authError && <div className="bg-rose-50 border-l-4 border-rose-500 p-3 rounded-md text-sm text-rose-700 font-medium">{authError}</div>}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">User ID</label>
                    <div className="mt-1 relative rounded-xl shadow-sm">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.User /></div>
                      <input type="text" required value={authForm.userId} onChange={e => setAuthForm({...authForm, userId: e.target.value})} className="block w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand-500 text-sm" placeholder="ID or Username" />
                    </div>
                  </div>
                  {authMode === 'REGISTER' && (
                    <>
                      <div>
                        <label className="block text-sm font-semibold text-gray-700">Position</label>
                        <div className="mt-1 relative rounded-xl shadow-sm">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.Briefcase /></div>
                          <select required value={authForm.position} onChange={e => setAuthForm({...authForm, position: e.target.value})} className="block w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand-500 text-sm">
                            <option value="" disabled>-- Select Position --</option>{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-semibold text-gray-700">Email</label>
                          <div className="mt-1 relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.Mail /></div><input type="email" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} className="block w-full pl-10 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm" /></div>
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700">Phone</label>
                          <div className="mt-1 relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.Phone /></div><input type="tel" value={authForm.phone} onChange={e => setAuthForm({...authForm, phone: e.target.value})} className="block w-full pl-10 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm" /></div>
                        </div>
                      </div>
                    </>
                  )}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Password</label>
                    <div className="mt-1 relative rounded-xl shadow-sm">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.Lock /></div>
                      <input type="password" required value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} className="block w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand-500 text-sm" placeholder="••••••••" />
                    </div>
                  </div>
                  {authMode === 'REGISTER' && (
                    <div>
                      <label className="block text-sm font-semibold text-gray-700">Confirm Password</label>
                      <div className="mt-1 relative rounded-xl shadow-sm">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><Icons.Lock /></div>
                        <input type="password" required value={authForm.confirmPassword} onChange={e => setAuthForm({...authForm, confirmPassword: e.target.value})} className="block w-full pl-10 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand-500 text-sm" placeholder="••••••••" />
                      </div>
                    </div>
                  )}
                  <button type="submit" disabled={authLoading} className="w-full py-3 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-brand-500 to-brand-600 shadow-md shadow-brand-200 hover:-translate-y-0.5 transition-all disabled:opacity-50">
                    {authLoading ? 'Processing...' : (authMode === 'LOGIN' ? 'Sign In' : 'Sign Up')}
                  </button>
                </form>
                <div className="mt-6 text-center">
                  <span className="text-sm text-gray-500">{authMode === 'LOGIN' ? "Don't have an account?" : "Already have an account?"}</span>
                  <button onClick={() => { setAuthMode(authMode==='LOGIN'?'REGISTER':'LOGIN'); setAuthError(''); }} className="ml-2 text-sm font-bold text-brand-600 hover:text-brand-800 transition-colors">
                    {authMode === 'LOGIN' ? 'Sign up now' : 'Log in instead'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (isLoading) return <div className="h-screen w-full flex items-center justify-center text-brand-500"><svg className="animate-spin h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><circle cx="12" cy="12" r="10" strokeOpacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10" strokeLinecap="round"/></svg></div>;

      return (
        <div className="flex h-screen bg-gray-50 overflow-hidden font-sans">
          <Sidebar onLogout={handleLogout} />
          <div className="flex-1 flex flex-col overflow-hidden relative">
            <TopHeader onRefresh={handleRefreshData} isRefreshing={isRefreshing} onLogout={handleLogout} />
            <main className="flex-1 overflow-y-auto overflow-x-hidden relative">
              {view === 'JOB_LIST' && <JobList />}
              {view === 'JOB_DETAIL' && <JobDetail />}
              {view === 'TASK_DETAIL' && <TaskDetail />}
              {view === 'DEFECT_DETAIL' && <DefectDetail />}
            </main>
          </div>
          
          {showJobForm && <JobModal />}
          {showTaskForm && <TaskModal />}
          {showDefectForm && <DefectModal />}
          
          {isDeleting && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center"><div className="bg-white px-8 py-5 rounded-xl shadow-2xl font-bold text-red-600 flex items-center gap-4 border border-red-100"><svg className="animate-spin h-6 w-6 text-red-600" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" className="opacity-25"></circle><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" className="opacity-75"></path></svg>กำลังลบข้อมูลออกจากระบบ...</div></div>}
          
          {/* --- ส่วน Modal แสดงผลลัพธ์ Export PDF --- */}
          {pdfLinks.length > 0 && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl w-full max-w-lg p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4 border-b pb-3">
                  <h2 className="text-xl font-bold text-emerald-600 flex items-center gap-2"><Icons.CheckCircle /> สร้างไฟล์ PDF สำเร็จ</h2>
                  <button onClick={() => setPdfLinks([])} className="text-gray-400 hover:text-red-500"><Icons.X /></button>
                </div>
                <div className="space-y-2">
                  {pdfLinks.map(link => (
                    <a key={link.taskId} href={link.url} target="_blank" rel="noreferrer" className="flex justify-between items-center p-4 border border-gray-100 bg-gray-50 rounded-xl hover:bg-brand-50 hover:border-brand-200 text-brand-700 transition-colors font-bold group">
                      <span className="flex items-center"><span className="mr-3 text-xl">📄</span> Document {link.taskId}</span>
                      <span className="text-gray-400 group-hover:text-brand-600"><Icons.ChevronLeft className="rotate-180"/></span>
                    </a>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
