<body class="font-sans text-gray-800 antialiased overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    // --- Persistent Mock DB สำหรับการทดสอบบน Canvas ---
    if (!window.sasMockDB) {
      window.sasMockDB = [
         { id: 'JOB-BKK-001', site: 'โครงการ Q House', owner: 'คุณสมชาย', ownerCompany: 'Q House PCL', staff: 'ณภัทร', status: 'Active', remark: 'เร่งด่วน', replyDueDate: '2026-03-31', tasks: [
           { id: 'BKK-T001', scope: 'SAS', building: 'Tower A', unit: 'A101', status: 'Active', customerName: 'คุณลูกค้า A', targetFixDate: '2026-04-15', defects: [
             { id: 'DEF-001', mainCategory: 'งานผนัง', subCategory: 'งานสีรองพื้น', description: 'สีผนังห้องรับแขกลอกเป็นแผ่น และมีรอยแตกร้าวบริเวณมุมห้อง', major: 'ไม่ใช่', team: 'ทีมช่างสี', status: 'รอดำเนินการ', targetStartDate: '2026-04-01', targetEndDate: '2026-04-15' },
             { id: 'DEF-002', mainCategory: 'งานระบบไฟฟ้า', subCategory: 'ไฟไม่ติด', description: 'หลอดไฟระเบียงไม่สามารถเปิดใช้งานได้', major: 'ใช่', team: 'ทีมช่างไฟ (Internal)', status: 'แก้ไขแล้ว', targetStartDate: '2026-04-02', targetEndDate: '2026-04-16' },
             { id: 'DEF-003', mainCategory: 'งานผนัง', subCategory: 'ก่ออิฐ/ฉาบปูน', description: 'พังหมดแล้วแก้ด่วนๆ', major: 'ใช่', team: 'ทีมช่างสี (Internal)', status: 'แก้ไขแล้ว', targetStartDate: '2026-04-05', targetEndDate: '2026-04-19' }
           ]}
         ]},
         { id: 'JOB-CNX-002', site: 'โครงการ Sansiri', owner: 'คุณสมหญิง', ownerCompany: 'Sansiri PCL', staff: 'ณเดช', status: 'รอดำเนินการ', remark: '', tasks: []}
      ];
    }

    if (typeof google === 'undefined') {
      window.google = {
        script: {
          run: new Proxy({}, {
            get: function(_, prop) {
              const handler = {
                success: null, failure: null,
                withSuccessHandler: function(cb) { this.success = cb; return new Proxy(this, proxyHandler); },
                withFailureHandler: function(cb) { this.failure = cb; return new Proxy(this, proxyHandler); }
              };
              const proxyHandler = {
                get: function(t, p) {
                  if (p in t) return typeof t[p] === 'function' ? t[p].bind(t) : t[p];
                  return function(...args) {
                    setTimeout(() => {
                      if (t.success) {
                        if (p === 'getAllData' || p === 'getAllDataForUser') {
                           t.success(JSON.stringify(window.sasMockDB));
                        }
                        else if (p === 'getMasterData') t.success(JSON.stringify({
                            sites: ['โครงการ Q House', 'โครงการ Sansiri'], 
                            owners: [{site: 'โครงการ Q House', owner: 'คุณสมชาย', ownerCompany: 'Q House PCL'}],
                            mainCategories: ['งานผนัง', 'งานฝ้าเพดาน', 'งานระบบไฟฟ้า', 'งานระบบประปา'],
                            subCategories: {
                              'งานผนัง': ['ก่ออิฐ/ฉาบปูน', 'งานสีรองพื้น', 'ผนังสำเร็จรูป'],
                              'งานฝ้าเพดาน': ['โครงคร่าว'],
                              'งานระบบไฟฟ้า': ['ตู้ Control', 'ท่อร้อยสาย', 'บล๊อคไฟ/Pool box', 'รางWireWay', 'สาย (G)', 'สาย (L)', 'สาย (N)'],
                              'งานระบบประปา': ['ท่อรั่ว', 'ก๊อกน้ำซึม']
                            },
                            teams: ['ทีมช่างสี (Internal)', 'ทีมช่างไฟ (Internal)', 'Supplier A (โครงสร้าง)', 'Supplier B (ประปา)'] // Mockup Data ทีมเข้าแก้ไข
                        }));
                        else if (p === 'loginUser') t.success({userId: args[0], fullName: 'ผู้ใช้งานระบบ (Mock)', role: 'ADMIN', isAdmin: true});
                        else if (p === 'getUsersForManagement') {
                           t.success(JSON.stringify([
                             { userId: 'test_user1', fullName: 'สมปอง ทดสอบ', email: 'sompong@test.com', phone: '0812345678', position: 'Supplier', role: 'PENDING', approved: false, isAdmin: false, isStaff: false, isSupplier: false, team: '' },
                             { userId: 'admin_1', fullName: 'ผู้ดูแลระบบ', email: 'admin@test.com', phone: '0899999999', position: 'SAS Staff', role: 'ADMIN', approved: true, isAdmin: true, isStaff: false, isSupplier: false, team: '' }
                           ]));
                        }
                        else if (p === 'exportTaskPlansToPDF') {
                           t.success(JSON.stringify([{taskId: 'MOCK-DOC', url: '#'}]));
                        }
                        else if (p === 'exportDefectReportToPDF') {
                           t.success(JSON.stringify({taskId: 'MOCK-DOC', url: '#'}));
                        }
                        else if (p === 'updateTaskStatusAndJob') {
                           let taskId = args[0];
                           let newStatus = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.status = newStatus;
                                 let allClosed = job.tasks.length > 0 && job.tasks.every(tk => tk.status === 'Closed');
                                 if (allClosed) job.status = 'Closed';
                                 else if (newStatus === 'Active' || job.status === 'Closed') job.status = 'Active';
                              }
                           });
                           t.success("Success");
                        }
                        else if (p === 'addDefect') {
                           let taskId = args[0];
                           let formData = args[1];
                           window.sasMockDB.forEach(job => {
                              let task = job.tasks.find(tk => tk.id === taskId);
                              if (task) {
                                 task.defects = task.defects || [];
                                 task.defects.push({ id: `DEF-NEW-${Date.now()}`, ...formData, status: 'รอดำเนินการ' });
                              }
                           });
                           t.success("DEF-NEW");
                        }
                        else if (p === 'deleteDefect') {
                           window.sasMockDB.forEach(job => {
                              job.tasks.forEach(task => {
                                 if (task.defects) task.defects = task.defects.filter(d => d.id !== args[0]);
                              });
                           });
                           t.success("Success");
                        }
                        else if (p === 'updateManagedUser') {
                           let payload = args[1];
                           let updated = { ...payload, approved: payload.approved, role: payload.roleValue };
                           t.success(JSON.stringify(updated));
                        }
                        else if (p === 'getCurrentUserProfile' || p === 'updateUserProfile') {
                           let userObj = JSON.parse(sessionStorage.getItem('sas_user')) || {userId: args[0], fullName: 'ผู้ใช้งานระบบ (Mock)', role: 'ADMIN', isAdmin: true};
                           if (p === 'updateUserProfile') {
                               userObj = { ...userObj, ...args[1] };
                           }
                           t.success(userObj);
                        }
                        else {
                           t.success("Mock-Success");
                        }
                      }
                    }, 400);
                  };
                }
              };
              if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') return handler[prop].bind(handler);
              return proxyHandler.get(handler, prop);
            }
          })
        }
      };
    }

    const { useState, useEffect, useRef } = React;

    // --- Data Options ---
    const STAFFS = ['ณภัทร ปรีชาวุฒิวงศ์', 'ณเดช คูกิมิยะ', 'USER_CURRENT'];
    const USER_ROLE_OPTIONS = ['SAS Staff', 'Supplier'];
    const USER_POSITION_OPTIONS = ['Admin', 'Staff', 'Supplier'];
    const ROLE_LABELS = { ADMIN: 'Admin', STAFF: 'Staff', SUPPLIER: 'Supplier', PENDING: 'Pending Approval' };

    // --- Icons (Phosphor/Lucide style via inline SVG) ---
    const Icons = {
      Menu: ({ className = "w-6 h-6" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
      Logo: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
      Grid: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>,
      Calendar: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      File: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>,
      Building: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="22"/><line x1="15" y1="22" x2="15" y2="22"/><line x1="9" y1="6" x2="9" y2="6"/><line x1="15" y1="6" x2="15" y2="6"/><line x1="9" y1="10" x2="9" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="9" y2="14"/><line x1="15" y1="14" x2="15" y2="14"/></svg>,
      Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Bell: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      ChevronLeft: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="15 18 9 12 15 6"/></svg>,
      ChevronRight: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="9 18 15 12 9 6"/></svg>,
      X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      DotsThree: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
      Trash: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
      Settings: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0-2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
      CheckCircle: ({ className = "w-5 h-5" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
      Download: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
      User: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
      Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
      Briefcase: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
      Mail: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>,
      Phone: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
      Refresh: ({ className }) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>,
      Home: ({ className }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      AlertCircle: ({ className }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    };

    // --- Helper Components ---
    const Avatar = ({ name, size = "sm" }) => {
      const initials = name ? name.substring(0, 2).toUpperCase() : 'U';
      const sizes = { sm: "w-8 h-8 text-xs", md: "w-10 h-10 text-sm" };
      return (
        <div className={`rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-white flex items-center justify-center font-bold border-2 border-white shadow-sm ${sizes[size]}`}>
          {initials}
        </div>
      );
    };

    const StatusBadge = ({ status, size = 'sm' }) => {
      let colorClass = 'bg-gray-500 shadow-gray-500/40'; // Default
      
      if (status === 'Active') {
        colorClass = 'bg-blue-500 shadow-blue-500/40';
      } else if (status === 'Closed' || status === 'แก้ไขแล้ว' || status === 'เสร็จสิ้น') {
        // อิงสีตามรูปภาพตัวอย่าง
        colorClass = 'bg-[#10b981] shadow-emerald-500/30';
      } else if (status === 'รอดำเนินการ' || status === 'ยังไม่แก้ไข') {
        colorClass = 'bg-amber-500 shadow-amber-500/40';
      } else if (status === 'Reject') {
        colorClass = 'bg-rose-500 shadow-rose-500/40';
      }
      
      const paddingAndText = size === 'lg' ? 'px-4 py-1.5 text-sm' : 'px-3 py-1 text-xs';
      
      return (
        <span className={`${paddingAndText} font-bold rounded-full text-white shadow-sm border-transparent ${colorClass} transition-all whitespace-nowrap`}>
          {status || 'ไม่มีสถานะ'}
        </span>
      );
    };

    // --- Component: Breadcrumb UI ---
    const Breadcrumb = ({ items, isCompact, variant = 'default' }) => {
      const isDark = variant === 'dark';
      
      return (
        <div className={`flex items-center flex-wrap gap-1 md:gap-1.5 ${isDark ? 'text-xs md:text-sm text-brand-100' : (isCompact ? 'text-xs md:text-sm text-gray-500' : 'text-xs md:text-sm text-brand-50')}`}>
          {items.map((item, index) => {
            const isLast = index === items.length - 1;
            return (
              <React.Fragment key={index}>
                <button 
                  onClick={item.onClick}
                  disabled={!item.onClick || isLast}
                  className={`flex items-center transition-colors px-2 py-1 rounded-lg ${
                    isLast 
                      ? (isDark ? 'font-bold text-white' : (isCompact ? 'font-bold text-gray-900' : 'font-bold text-white')) 
                      : (isDark ? 'hover:text-white hover:bg-white/10' : (isCompact ? 'hover:text-brand-600 hover:bg-brand-50' : 'hover:text-white hover:bg-white/20'))
                  } ${!item.onClick && !isLast ? 'cursor-default' : ''}`}
                >
                  {item.icon && <span className={item.label ? 'mr-1.5' : ''}>{item.icon}</span>}
                  {item.label}
                </button>
                {!isLast && (
                  <Icons.ChevronRight className={`w-3.5 h-3.5 shrink-0 ${isDark ? 'text-brand-300/50' : (isCompact ? 'text-gray-400' : 'text-brand-200/70')}`} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    };

    // --- Component: Global Loading Overlay ---
    const FullScreenLoader = ({ message, type = 'primary' }) => {
      const colors = {
        primary: 'text-brand-600 border-brand-100',
        danger: 'text-red-600 border-red-100',
        success: 'text-emerald-600 border-emerald-100'
      };
      const svgColors = {
        primary: 'text-brand-600',
        danger: 'text-red-600',
        success: 'text-emerald-600'
      };
      const colorClass = colors[type] || colors.primary;
      const svgColor = svgColors[type] || svgColors.primary;
      
      return (

              <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" className="opacity-25"></circle>
              <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" className="opacity-75"></path>
            </svg>

    // --- Component จัดการรูปภาพ (วาด + ใส่ลายน้ำ พิกัด & เวลา) ---
    const ImageAnnotator = ({ imageSrc, field, onSave, onClose }) => {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [location, setLocation] = useState('กำลังหาพิกัด...');
      const [color, setColor] = useState('#ef4444'); // Default Red
      const [baseImgData, setBaseImgData] = useState(null); 

      useEffect(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => setLocation(`Lat: ${pos.coords.latitude.toFixed(5)}, Lng: ${pos.coords.longitude.toFixed(5)}`),
            (err) => setLocation('Location: ไม่สามารถดึงพิกัดได้')
          );
        } else {
          setLocation('Location: ไม่รองรับการดึงพิกัด');
        }

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 800;
          const MAX_HEIGHT = 800;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > MAX_WIDTH) {
              height = Math.round((height * MAX_WIDTH) / width);
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width = Math.round((width * MAX_HEIGHT) / height);
              height = MAX_HEIGHT;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          
          ctx.drawImage(img, 0, 0, width, height);

          const timestamp = new Date().toLocaleString('th-TH');
          const watermarkText = `${timestamp} | ${location}`;
          
          ctx.font = `bold ${Math.max(14, width * 0.035)}px Sarabun, sans-serif`;
          ctx.fillStyle = 'yellow';
          ctx.strokeStyle = 'black';
          ctx.lineWidth = 3;
          ctx.textBaseline = 'bottom';
          ctx.textAlign = 'right';
          
          ctx.strokeText(watermarkText, width - 15, height - 15);
          ctx.fillText(watermarkText, width - 15, height - 15);
          
          setBaseImgData(ctx.getImageData(0, 0, width, height));
        };
        img.src = imageSrc;
      }, [imageSrc, location]);

      const startDrawing = (e) => { setIsDrawing(true); draw(e); };
      const finishDrawing = () => { setIsDrawing(false); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); };
      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(3, canvas.width * 0.005);
        ctx.lineCap = 'round';

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const handleClearDrawing = () => {
        if (baseImgData && canvasRef.current) {
          const ctx = canvasRef.current.getContext('2d');
          ctx.putImageData(baseImgData, 0, 0);
        }
      };

      const handleSave = () => {
        const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.8);
        onSave(field, dataUrl);
      };

      const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308']; 

      return (
        <div className="fixed inset-0 bg-gray-900/95 z-[60] flex flex-col items-center justify-center p-4">
          <div className="text-white mb-2 flex justify-between w-full max-w-2xl items-center">
            <span className="font-bold">ใช้นิ้ววาดเพื่อเน้นจุด</span>
            <button onClick={onClose} className="text-gray-400 hover:text-white p-2 bg-gray-800 rounded-full"><Icons.X className="w-5 h-5"/></button>
          </div>
          
          <div className="relative border border-gray-600 bg-black overflow-hidden w-full max-w-2xl rounded-xl shadow-2xl mb-4" style={{ maxHeight: '65vh' }}>
            <canvas 
              ref={canvasRef}
              onMouseDown={startDrawing} onMouseUp={finishDrawing} onMouseMove={draw} onMouseLeave={finishDrawing}
              onTouchStart={startDrawing} onTouchEnd={finishDrawing} onTouchMove={draw}
              className="w-full h-auto touch-none cursor-crosshair"
            />
          </div>

          <div className="flex items-center gap-4 bg-gray-800 p-3 rounded-2xl w-full max-w-2xl justify-between shadow-lg">
            <div className="flex gap-3 items-center">
               {colors.map(c => (
                  <button 
                    key={c} 
                    onClick={() => setColor(c)} 
                    className={`w-8 h-8 rounded-full border-2 transition-transform ${color === c ? 'border-white scale-110 shadow-lg' : 'border-transparent opacity-80 hover:opacity-100'}`} 
                    style={{backgroundColor: c}}
                  ></button>
               ))}
            </div>
            <button onClick={handleClearDrawing} className="text-sm font-semibold text-gray-300 hover:text-white flex items-center gap-1.5 bg-gray-700 px-3 py-2 rounded-xl transition-colors">
               <Icons.Refresh className="w-4 h-4" /> ลบเส้นวาด
            </button>
          </div>

          <div className="flex gap-4 mt-4 w-full max-w-2xl">
            <button onClick={onClose} className="flex-1 py-3.5 bg-gray-800 hover:bg-gray-700 border border-gray-600 transition-colors text-white rounded-xl font-bold">ยกเลิก</button>
            <button onClick={handleSave} className="flex-1 py-3.5 bg-brand-600 hover:bg-brand-500 transition-colors text-white rounded-xl font-bold flex items-center justify-center shadow-lg shadow-brand-200/50">
              <span className="mr-2"><Icons.CheckCircle/></span> ยืนยันรูปภาพ
            </button>
          </div>
        </div>
      );
    };

    // --- Component จัดการอัปโหลดรูป ---
    const DefectImagesUploader = ({ defect, taskStatus, onSuccess }) => {
      const [images, setImages] = useState({
        imgUnit: defect?.imgUnit || '',
        imgBefore: defect?.imgBefore || '',
        imgDuring: defect?.imgDuring || '',
        imgAfter: defect?.imgAfter || ''
      });
      const [uploadingField, setUploadingField] = useState(null);
      const [isSavingStatus, setIsSavingStatus] = useState(false);
      const [editingImage, setEditingImage] = useState(null);

      const isTaskActive = taskStatus === 'Active';
      const isTaskRejected = taskStatus === 'Reject';
      const isTaskClosed = taskStatus === 'Closed';
      const isDefectFixed = defect?.status === 'แก้ไขแล้ว';

      const handleFileChange = (field, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
              setImages(prev => ({ ...prev, [field]: reader.result }));
            } else {
              setEditingImage({ field: field, src: reader.result });
            }
          };
          reader.readAsDataURL(file);
        }
        e.target.value = null; 
      };

      const handleAnnotatorSave = (field, dataUrl) => {
        setImages(prev => ({ ...prev, [field]: dataUrl }));
        setEditingImage(null);
      };

      const handleClearImage = (field) => {
        if (!window.confirm('คุณต้องการลบรูปภาพนี้ใช่หรือไม่?')) return;
        setImages(prev => ({ ...prev, [field]: '' }));
      };

      const handleUploadSingle = (field) => {
        setUploadingField(field);
        google.script.run
          .withSuccessHandler(url => {
            setImages(prev => ({ ...prev, [field]: url }));
            setUploadingField(null);
            onSuccess();
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกรูป: ' + err.message);
            setUploadingField(null);
          })
          .uploadSingleDefectImage(defect?.id, field, images[field]);
      };

      const handleFinishDefect = () => {
        setIsSavingStatus(true);
        google.script.run
          .withSuccessHandler(() => {
            alert('เปลี่ยนสถานะ Defect เป็น "แก้ไขแล้ว" สำเร็จ');
            setIsSavingStatus(false);
            onSuccess(); 
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาด: ' + err.message);
            setIsSavingStatus(false);
          })
          .updateDefectStatus(defect?.id, 'แก้ไขแล้ว');
      };

      const ImageBox = ({ label, field, disabledReason }) => {
        const isDisabled = !!disabledReason;
        const currentImg = images[field];
        const isBase64 = currentImg && currentImg.startsWith('data:image');
        const isUploaded = currentImg && currentImg.startsWith('http');
        const isUploading = uploadingField === field;

        const getDirectImageUrl = (url) => {
          if (!url) return '';
          if (url.startsWith('data:image')) return url;
          const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
          if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
          return url;
        };

        return (
          <div className={`relative border rounded-2xl p-4 md:p-5 flex flex-col items-center justify-between shadow-sm transition-all ${isDisabled ? 'bg-gray-50 border-gray-200' : isBase64 ? 'bg-brand-50 border-brand-300' : 'bg-white border-gray-200 hover:border-brand-400'}`}>
            <h4 className="font-bold text-gray-800 mb-3 md:mb-4 text-sm md:text-base text-center w-full pb-2 md:pb-3 border-b border-gray-100">{label}</h4>
            
            <div className="flex-1 w-full flex flex-col items-center justify-center mb-4 md:mb-5 relative">
              {currentImg ? (
                <div className="relative group w-full flex justify-center h-48 md:h-64">
                  <img src={getDirectImageUrl(currentImg)} alt={label} className={`w-full h-full object-cover rounded-xl border border-gray-200 shadow-sm ${isDisabled ? 'opacity-50' : ''}`} />
                  
                  {!isDisabled && !isTaskRejected && !isTaskClosed && !isDefectFixed && (
                    <button 
                       onClick={(e) => { e.stopPropagation(); handleClearImage(field); }} 
                       className="absolute top-2 left-2 bg-white/90 text-red-500 p-2 rounded-full shadow-md hover:bg-red-50 hover:text-red-600 transition-colors"
                       title="ลบรูปภาพเพื่อเลือกใหม่"
                    >
                       <Icons.Trash className="w-4 h-4" />
                    </button>
                  )}

                  {isUploaded && (
                    <div className="absolute top-3 right-3 bg-gradient-to-br from-emerald-400 to-emerald-500 text-white text-xs font-bold px-3 py-1.5 rounded-full flex items-center shadow-md border border-emerald-300">
                      <span className="mr-1"><Icons.CheckCircle/></span> บันทึกแล้ว
                    </div>
                  )}
                </div>
              ) : (
                <div 
                  className={`h-48 md:h-64 flex flex-col items-center justify-center w-full rounded-xl text-sm text-center p-4 border-2 border-dashed transition-all ${isDisabled ? 'text-gray-400 border-gray-200 bg-gray-50' : 'text-gray-400 border-gray-300 bg-gray-50 hover:bg-brand-50 hover:border-brand-400 hover:text-brand-600 cursor-pointer'}`}
                  onClick={() => !isDisabled && document.getElementById(`file-${field}`).click()}
                >
                  <span className="mb-3 opacity-60 scale-150"><Icons.File /></span>
                  {isDisabled ? disabledReason : <span className="font-semibold">แตะเพื่อเลือกรูปภาพ</span>}
                </div>
              )}
            </div>
            
            <div className="w-full flex flex-col gap-2">
              <input 
                id={`file-${field}`}
                type="file" 
                accept="image/*" 
                onChange={(e) => handleFileChange(field, e)} 
                disabled={isDisabled || isTaskRejected || isDefectFixed || isTaskClosed} 
                className="hidden" 
              />
              
              {isBase64 && (
                <button
                  onClick={() => handleUploadSingle(field)}
                  disabled={isUploading}
                  className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-xl shadow-md font-bold transition-colors flex justify-center items-center animate-pulse hover:animate-none"
                >
                  {isUploading ? 'กำลังบันทึก...' : 'คลิกเพื่อบันทึกรูปนี้'}
                </button>
              )}
            </div>
          </div>
        );
      };

      const allImagesUploadedAndSaved = 
        images.imgUnit && images.imgUnit.startsWith('http') &&
        images.imgBefore && images.imgBefore.startsWith('http') &&
        images.imgDuring && images.imgDuring.startsWith('http') &&
        images.imgAfter && images.imgAfter.startsWith('http');

      return (
        <div className="w-full">
          {editingImage && <ImageAnnotator imageSrc={editingImage.src} field={editingImage.field} onSave={handleAnnotatorSave} onClose={() => setEditingImage(null)} />}
          {uploadingField && <FullScreenLoader message="กำลังอัปโหลดรูปภาพ..." />}
          {isSavingStatus && <FullScreenLoader message="กำลังอัปเดตสถานะ..." />}

          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
              <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">จัดการรูปภาพ</h3>
              <p className="text-sm text-gray-500 mt-1">อัปโหลดและบันทึกภาพให้ครบทั้ง 4 ขั้นตอนเพื่อจบงาน</p>
            </div>
            <div className="text-right w-full md:w-auto">
              {!isTaskActive && !isTaskRejected && !isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-amber-50 to-yellow-100 text-amber-700 text-sm font-bold rounded-md border border-amber-200 shadow-sm w-full md:w-auto text-center">⚠️ ต้องเปิดใบงาน (Active) ก่อน</span>}
              {isTaskRejected && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-rose-50 to-red-100 text-rose-700 text-sm font-bold rounded-md border border-rose-200 shadow-sm w-full md:w-auto text-center">⚠️ ใบงานถูก Reject ไม่อนุญาต</span>}
              {isTaskClosed && <span className="inline-block px-3 py-1.5 bg-gradient-to-br from-gray-50 to-slate-100 text-gray-600 text-sm font-bold rounded-md border border-gray-200 shadow-sm w-full md:w-auto text-center">🔒 ใบงานถูกปิดแล้ว</span>}
            </div>
          </div>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8">
            <ImageBox label="1. เลขยูนิต" field="imgUnit" disabledReason={!isTaskActive && !images['imgUnit'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="2. ก่อนแก้ไข" field="imgBefore" disabledReason={isTaskRejected ? "ไม่อนุญาต" : null} />
            <ImageBox label="3. ระหว่างแก้ไข" field="imgDuring" disabledReason={!isTaskActive && !images['imgDuring'] ? "เปิดใบงานก่อน" : null} />
            <ImageBox label="4. หลังแก้ไข" field="imgAfter" disabledReason={!isTaskActive && !images['imgAfter'] ? "เปิดใบงานก่อน" : null} />
          </div>
          
          <div className="mt-8 flex justify-end border-t border-gray-200 pt-6">
            <button 
              onClick={handleFinishDefect} 
              disabled={!allImagesUploadedAndSaved || isSavingStatus || isDefectFixed || isTaskClosed} 
              className={`px-8 py-3.5 text-white rounded-xl flex items-center font-bold text-sm transition-all w-full md:w-auto justify-center ${
                isDefectFixed || isTaskClosed ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                : !allImagesUploadedAndSaved ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                : 'bg-emerald-600 hover:bg-emerald-700 shadow-md shadow-emerald-200 hover:-translate-y-0.5'
              }`}
            >
              {isDefectFixed ? '✅ แก้ไขเสร็จสิ้นแล้ว' : 
               <React.Fragment><span className="mr-2"><Icons.CheckCircle/></span> ยืนยันแก้ไขเสร็จสิ้น</React.Fragment>}
            </button>
          </div>
        </div>
      );
    };

    // --- Main App Component ---
    function App() {
      // Auth State
      const [currentUser, setCurrentUser] = useState(() => {
        const savedUser = sessionStorage.getItem('sas_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [authMode, setAuthMode] = useState('LOGIN');
      const [authForm, setAuthForm] = useState({ userId: '', password: '', confirmPassword: '', fullName: '', roleValue: '', email: '', line: '', phone: '' });
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState('');

      const [view, setView] = useState('DASHBOARD');

      const [isExportingPDF, setIsExportingPDF] = useState(false);
      const [pdfLinks, setPdfLinks] = useState([]);

      const [activeDefectId, setActiveDefectId] = useState(null);

        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const toggleSidebar = () => setIsSidebarOpen(prev => !prev);

      const isAdmin = currentUser?.isAdmin === true || currentUser?.role === 'ADMIN';
      const isStaff = currentUser?.isStaff === true || currentUser?.role === 'STAFF';
      const isSupplier = currentUser?.isSupplier === true || currentUser?.role === 'SUPPLIER';
      const canManageProjects = isAdmin || isStaff;
      const canManageUsers = isAdmin;

      const fetchData = (softRefresh = false) => {
        if (softRefresh) {
          setIsRefreshing(true);
        } else {
          setIsLoading(true);
        }
        
        google.script.run
          .withSuccessHandler(data => { 
            setJobs(JSON.parse(data)); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .withFailureHandler(err => { 
            console.error(err); 
            alert('เกิดข้อผิดพลาดในการโหลดข้อมูล'); 
            setIsLoading(false); 
            setIsRefreshing(false);
          })
          .getAllDataForUser(currentUser?.userId || '');
      };

      const fetchManagedUsers = () => {
        if (!canManageUsers || !currentUser?.userId) return;
        setIsUsersLoading(true);
        google.script.run
          .withSuccessHandler(data => {
            setManagedUsers(JSON.parse(data));
            setIsUsersLoading(false);
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการโหลดผู้ใช้งาน: ' + err.message);
            setIsUsersLoading(false);
          })
          .getUsersForManagement(currentUser.userId);
      };

      const fetchMasterData = () => {
        google.script.run
          .withSuccessHandler(data => {
            const parsed = JSON.parse(data);
            setOwnerMaster(parsed.owners);
            setUniqueSites(parsed.sites);
            setMainCategories(parsed.mainCategories || []);
            setSubCategoriesMap(parsed.subCategories || {});

          })
          .withFailureHandler(err => console.error('Error fetching master data:', err))
          .getMasterData();
      };

      const refreshCurrentUserProfile = () => {
        if (!currentUser?.userId) return;
        google.script.run
          .withSuccessHandler(user => {
            sessionStorage.setItem('sas_user', JSON.stringify(user));
            setCurrentUser(user);
            setProfileForm({
              fullName: user.fullName || '',
              email: user.email || '',
              line: user.line || '',
              phone: user.phone || '',
              password: '',
              confirmPassword: ''
            });
          })
          .withFailureHandler(err => console.error('Error refreshing user profile:', err))
          .getCurrentUserProfile(currentUser.userId);
      };

      useEffect(() => {
        if (!currentUser) return;
        fetchData();
        fetchMasterData();
        fetchManagedUsers();
        refreshCurrentUserProfile();

      useEffect(() => {
        if (!currentUser) return;
        if (isSupplier && !isAdmin && !isStaff && !['SUPPLIER_DEFECTS', 'DEFECT_DETAIL', 'PROFILE_SETTINGS'].includes(view)) {
          setView('SUPPLIER_DEFECTS');
        }
        if (!isSupplier && view === 'SUPPLIER_DEFECTS') {
          setView('DASHBOARD');
        }
      }, [currentUser, view]);

      const handleRefreshData = () => {
        fetchData(true);
        fetchManagedUsers();
        refreshCurrentUserProfile();
      };

      const handleLogout = () => {
        sessionStorage.removeItem('sas_user');
        setCurrentUser(null);
      };

      const activeJob = jobs.find(j => j.id === activeJobId);
      const activeTask = activeJob?.tasks?.find(t => t.id === activeTaskId);
      const activeDefect = activeTask?.defects?.find(d => d.id === activeDefectId);

      const allTasks = jobs.flatMap(job => job.tasks || []);
      const allDefects = allTasks.flatMap(task => task.defects || []);
      const activeProjectsCount = jobs.filter(job => job.status === 'Active').length;
      const closedProjectsCount = jobs.filter(job => job.status === 'Closed').length;
      const pendingProjectsCount = jobs.filter(job => job.status === 'รอดำเนินการ' || !job.status).length;
      const activeTasksCount = allTasks.filter(task => task.status === 'Active').length;
      const pendingTasksCount = allTasks.filter(task => task.status === 'รอดำเนินการ' || !task.status).length;
      const completedDefectsCount = allDefects.filter(defect => defect.status === 'แก้ไขแล้ว' || defect.status === 'Closed' || defect.status === 'เสร็จสิ้น').length;
      const pendingDefectsCount = allDefects.filter(defect => defect.status === 'ยังไม่แก้ไข' || defect.status === 'รอดำเนินการ' || !defect.status).length;
      const majorDefectsCount = allDefects.filter(defect => defect.major === 'ใช่').length;
      const sasTasksCount = allTasks.filter(task => task.scope === 'SAS').length;
      const voTasksCount = allTasks.filter(task => task.scope === 'VO').length;
      const completionRate = allDefects.length > 0 ? Math.round((completedDefectsCount / allDefects.length) * 100) : 0;
      const topProjects = [...jobs]
        .map(job => ({
          ...job,
          totalDefects: (job.tasks || []).reduce((sum, task) => sum + ((task.defects || []).length), 0),
          activeTasks: (job.tasks || []).filter(task => task.status === 'Active').length
        }))
        .sort((a, b) => b.totalDefects - a.totalDefects)
        .slice(0, 5);
      const urgentDefects = allDefects
        .filter(defect => defect.major === 'ใช่' || defect.status === 'ยังไม่แก้ไข' || defect.status === 'รอดำเนินการ')
        .slice(0, 6);

      const supplierDefects = jobs.flatMap(job => (job.tasks || []).flatMap(task => (task.defects || []).map(defect => ({
        ...defect,
        taskId: task.id,
        taskScope: task.scope,
        taskStatus: task.status,
        building: task.building,
        unit: task.unit,
        customerName: task.customerName,
        jobId: job.id,
        site: job.site,
        owner: job.owner,
        ownerCompany: job.ownerCompany
      }))));

      const handleCreateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .addJob(formData);
      };
      
      const handleUpdateJob = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowJobForm(false); setEditingJob(null); setIsSaving(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาด: ' + err.message); setIsSaving(false); })
          .updateJob(formData);
      };

      const handleDeleteJob = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานหลัก ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeJobId === id) setView('JOB_LIST'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteJob(id);
        }
      };
      
      const handleCreateTask = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowTaskForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addTask(activeJobId, formData);
      };

      const handleDeleteTask = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบใบงานย่อย ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeTaskId === id) setView('JOB_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteTask(id);
        }
      };
      
      const handleCreateDefect = (formData) => {
        setIsSaving(true);
        google.script.run.withSuccessHandler(() => { fetchData(true); setShowDefectForm(false); setIsSaving(false); })
          .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).addDefect(activeTaskId, formData);
      };

      const handleDeleteDefect = (id, e) => {
        e.stopPropagation();
        if (window.confirm(`⚠️ คุณต้องการลบรายการ Defect ${id} ใช่หรือไม่?`)) {
          setIsDeleting(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsDeleting(false); if (activeDefectId === id) setView('TASK_DETAIL'); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsDeleting(false); }).deleteDefect(id);
        }
      };

      const handleUpdateTaskStatus = (id, status) => {
        if (window.confirm(`⚠️ ยืนยันการเปลี่ยนสถานะเป็น "${status}" ใช่หรือไม่?`)) {
          setIsSaving(true);
          google.script.run.withSuccessHandler(() => { fetchData(true); setIsSaving(false); })
            .withFailureHandler(err => { alert('Error: ' + err.message); setIsSaving(false); }).updateTaskStatusAndJob(id, status);
        }
      };

      const handleExportTaskPlans = () => {
        if (!activeJob?.tasks || activeJob.tasks.length === 0) return alert('ไม่มีใบงานย่อยให้ Export');
        setIsExportingPDF(true);
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks(JSON.parse(res)); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportTaskPlansToPDF(activeJobId);
      };

      const handleExportDefectReport = (taskId, e) => {
        e.stopPropagation();
        setIsExportingPDF(true); 
        google.script.run.withSuccessHandler((res) => { setIsExportingPDF(false); setPdfLinks([JSON.parse(res)]); })
          .withFailureHandler((err) => { setIsExportingPDF(false); alert('Error: ' + err.message); }).exportDefectReportToPDF(taskId);
      };

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        setAuthError('');

        if (!authForm.userId.trim() || !authForm.password.trim()) {
          setAuthError('กรุณากรอก User ID และ Password');
          return;
        }

        if (authMode === 'REGISTER') {
          if (!authForm.fullName.trim()) {
            setAuthError('กรุณากรอกชื่อ - นามสกุล');
            return;
          }
          if (!authForm.roleValue) {
            setAuthError('กรุณาเลือก Role');
            return;
          }
          if (authForm.password !== authForm.confirmPassword) {
            setAuthError('Password และ Confirm Password ไม่ตรงกัน');
            return;
          }
        }

        setAuthLoading(true);

        if (authMode === 'LOGIN') {
          google.script.run
            .withSuccessHandler(user => {
              sessionStorage.setItem('sas_user', JSON.stringify(user));
              setCurrentUser(user);
              setProfileForm({
                fullName: user.fullName || '',
                email: user.email || '',
                line: user.line || '',
                phone: user.phone || '',
                password: '',
                confirmPassword: ''
              });
              setView(user?.isSupplier && !user?.isAdmin && !user?.isStaff ? 'SUPPLIER_DEFECTS' : 'DASHBOARD');
              setAuthLoading(false);
            })
            .withFailureHandler(err => {
              setAuthError(err.message || 'ไม่สามารถเข้าสู่ระบบได้');
              setAuthLoading(false);
            })
            .loginUser(authForm.userId, authForm.password);
          return;
        }

        google.script.run
          .withSuccessHandler(() => {
            setAuthLoading(false);
            alert('ลงทะเบียนสำเร็จ กรุณารอผู้ดูแลระบบอนุมัติสิทธิ์ก่อนเข้าใช้งาน');
            setAuthMode('LOGIN');
            setAuthForm({ userId: authForm.userId, password: '', confirmPassword: '', fullName: '', roleValue: '', email: '', line: '', phone: '' });
          })
          .withFailureHandler(err => {
            setAuthError(err.message || 'ไม่สามารถลงทะเบียนได้');
            setAuthLoading(false);
          })
          .registerUser({
            userId: authForm.userId,
            password: authForm.password,
            confirmPassword: authForm.confirmPassword,
            fullName: authForm.fullName,
            roleValue: authForm.roleValue,
            email: authForm.email,
            line: authForm.line,
            phone: authForm.phone
          });
      };

      const handleUpdateManagedUser = (userId, payload) => {
        if (!currentUser?.userId) return;
        setIsSaving(true);
        google.script.run
          .withSuccessHandler(updatedUserJson => {
            const updatedUser = JSON.parse(updatedUserJson);
            setManagedUsers(prev => prev.map(user => user.userId === userId ? updatedUser : user));
            if (currentUser?.userId === userId) {
              sessionStorage.setItem('sas_user', JSON.stringify(updatedUser));
              setCurrentUser(updatedUser);
            }
            setIsSaving(false);
            alert('บันทึกข้อมูลและสิทธิ์ผู้ใช้งานสำเร็จ');
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูลผู้ใช้งาน: ' + err.message);
            setIsSaving(false);
          })
          .updateManagedUser(currentUser.userId, { userId, ...payload });
      };

      const handleSaveProfile = () => {
        if (!currentUser?.userId) return;
        setIsSaving(true);
        google.script.run
          .withSuccessHandler(user => {
            sessionStorage.setItem('sas_user', JSON.stringify(user));
            setCurrentUser(user);
            setProfileForm({
              fullName: user.fullName || '',
              email: user.email || '',
              line: user.line || '',
              phone: user.phone || '',
              password: '',
              confirmPassword: ''
            });
            setIsSaving(false);
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูลโปรไฟล์: ' + err.message);
            setIsSaving(false);
          })
          .updateUserProfile(currentUser.userId, profileForm);
      };

      const handleDeleteManagedUser = (userId) => {
        if (!currentUser?.userId) return;
        if (!window.confirm(`⚠️ คุณต้องการลบผู้ใช้งาน ${userId} ใช่หรือไม่?`)) return;
        setIsDeleting(true);
        google.script.run
          .withSuccessHandler(() => { fetchManagedUsers(); setIsDeleting(false); })
          .withFailureHandler(err => { alert('เกิดข้อผิดพลาดในการลบผู้ใช้งาน: ' + err.message); setIsDeleting(false); })
          .deleteManagedUser(currentUser.userId, userId);
      };

      const handleAddManagedUser = (payload) => {
        if (!currentUser?.userId) return;
        setIsSaving(true);
        google.script.run
          .withSuccessHandler(() => {
            fetchManagedUsers();
            setIsSaving(false);
            alert('เพิ่มบัญชีผู้ใช้งานสำเร็จ');
          })
          .withFailureHandler(err => {
            alert('เกิดข้อผิดพลาดในการเพิ่มข้อมูลผู้ใช้งาน: ' + err.message);
            setIsSaving(false);
          })
          .addManagedUser(currentUser.userId, payload);
      };

      // --- Modals ---
      const JobModal = () => {
        const isEditMode = !!editingJob;
        
        const [formData, setFormData] = useState({ 
          id: editingJob ? editingJob.id : '',
          site: editingJob ? editingJob.site : (uniqueSites[0] || ''), 
          owner: editingJob ? editingJob.owner : '', 
          ownerCompany: editingJob ? editingJob.ownerCompany : '', 
          staff: editingJob ? editingJob.staff : STAFFS[2], 
          replyDueDate: editingJob ? editingJob.replyDueDate : '', 
          remark: editingJob ? editingJob.remark : '' 
        });
        
        useEffect(() => {
          if (!isEditMode && uniqueSites.length > 0 && formData.site === uniqueSites[0] && formData.owner === '') {
            const defaultOwners = ownerMaster.filter(m => m.site === uniqueSites[0]);
            if (defaultOwners.length > 0) setFormData(prev => ({...prev, owner: defaultOwners[0].owner, ownerCompany: defaultOwners[0].ownerCompany}));
          }
        }, [uniqueSites, ownerMaster, isEditMode]);
        
        const availableOwners = ownerMaster.filter(m => m.site === formData.site);
        const uniqueOwnersList = [...new Set(availableOwners.map(m => m.owner))];
        
        const handleSiteChange = (e) => {
          const newSite = e.target.value;
          const filtered = ownerMaster.filter(m => m.site === newSite);
          setFormData({...formData, site: newSite, owner: filtered[0]?.owner || '', ownerCompany: filtered[0]?.ownerCompany || ''});
        };
        const handleOwnerChange = (e) => {
          const newOwner = e.target.value;
          const matched = ownerMaster.find(m => m.site === formData.site && m.owner === newOwner);
          setFormData({...formData, owner: newOwner, ownerCompany: matched ? matched.ownerCompany : ''});
        };
        const handleClose = () => { setShowJobForm(false); setEditingJob(null); };
        const handleSubmit = () => {
          if (isEditMode) { if (window.confirm('ยืนยันบันทึกการแก้ไข?')) handleUpdateJob(formData); } 
          else handleCreateJob(formData);
        };

        return (
          <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
              <div className="bg-gray-50 px-6 py-4 border-b border-white/10 flex justify-between items-center">
                <h2 className="text-lg font-bold text-gray-800">{isEditMode ? `แก้ไขใบงานหลัก: ${formData.id}` : 'Create New Project'}</h2>
                <button onClick={handleClose} className="text-gray-400 hover:text-gray-700 bg-white rounded-full p-1 shadow-sm"><Icons.X /></button>
              </div>
              <div className="p-6 space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Site Location *</label>
                  <select className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none" value={formData.site} onChange={handleSiteChange}>
                    {uniqueSites.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Owner *</label>
                    <select className="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none" value={formData.owner} onChange={handleOwnerChange}>
                      {uniqueOwnersList.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Company</label>
                    <input type="text" className="w-full bg-gray-100 border border-gray-200 rounded-xl p-3 text-sm text-gray-500" value={formData.ownerCompany} readOnly />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Assign Staff *</label>

                </div>
                <div>

                  <textarea className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:border-brand-500 outline-none" rows="2" value={formData.remark} onChange={e => setFormData({...formData, remark: e.target.value})}></textarea>

                <button onClick={handleSubmit} disabled={isSaving} className="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-brand-500 to-brand-600 shadow-md shadow-brand-200 hover:-translate-y-0.5 transition-all disabled:opacity-70">
                  {isSaving ? 'Saving...' : (isEditMode ? 'Update Project' : 'Create Project')}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const TaskModal = () => {
        const [formData, setFormData] = useState({ scope: 'SAS', building: '', unit: '', customerName: '', targetFixDate: '', remark: '' });
        return (
          <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">

                  <input type="date" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-brand-500" value={formData.targetFixDate} onChange={e => setFormData({...formData, targetFixDate: e.target.value})} />

      const DefectModal = () => {
        const isVO = activeTask?.scope === 'VO';
        
        // Helper ในการดึง Sub Category โดยอ้างอิงจาก Main Category
        const getSubsForCategory = (mainCat) => {
          if (!mainCat || !subCategoriesMap) return [];
          const target = mainCat.trim();
          for (const key in subCategoriesMap) {
             if (key.trim() === target) return subCategoriesMap[key];
          }
          return [];
        };

        const defaultMain = mainCategories.length > 0 ? mainCategories[0] : '';
        const defaultSubList = getSubsForCategory(defaultMain);
        const defaultSub = defaultSubList.length > 0 ? defaultSubList[0] : '';

        const [formData, setFormData] = useState({ 
          mainCategory: defaultMain, 
          subCategory: defaultSub, 
          description: '', 
          major: 'ไม่ใช่', 
          team: teams.length > 0 ? teams[0] : '', 
          voSteps: '', 
          imgBefore: '',
          targetStartDate: '',
          targetEndDate: ''
        });

        useEffect(() => {
          if (!formData.mainCategory && mainCategories.length > 0) {
             const initialMain = mainCategories[0];
             const initialSubList = getSubsForCategory(initialMain);
             setFormData(prev => ({
               ...prev, 
               mainCategory: initialMain, 
               subCategory: initialSubList.length > 0 ? initialSubList[0] : '',
               team: prev.team || (teams.length > 0 ? teams[0] : '')
             }));
          } else if (!formData.team && teams.length > 0) {
             setFormData(prev => ({ ...prev, team: teams[0] }));
          }
        }, [mainCategories, subCategoriesMap, teams]);
        
        const handleMainCatChange = (e) => {
          const main = e.target.value;
          const subs = getSubsForCategory(main);
          setFormData({
            ...formData, 
            mainCategory: main, 
            subCategory: subs.length > 0 ? subs[0] : ''
          });
        };

        const handleDateChange = (e) => {
          const startDateStr = e.target.value;
          if (!startDateStr) {
            setFormData({...formData, targetStartDate: '', targetEndDate: ''});
            return;
          }
          
          const startDate = new Date(startDateStr);
          startDate.setDate(startDate.getDate() + 14); // บวกเพิ่ม 14 วัน
          
          const year = startDate.getFullYear();
          const month = String(startDate.getMonth() + 1).padStart(2, '0');
          const day = String(startDate.getDate()).padStart(2, '0');
          const endDateStr = `${year}-${month}-${day}`;
          
          setFormData({...formData, targetStartDate: startDateStr, targetEndDate: endDateStr});
        };

        const handleSave = () => {
          if (!formData.targetStartDate) return alert('กรุณาระบุ วันเข้าแก้ไข');
          if (!formData.description.trim()) return alert('กรุณากรอกรายละเอียด Description');
          if (!formData.subCategory) return alert('กรุณาเลือก Sub Category');
          if (isVO && !formData.voSteps.trim()) return alert('กรุณาระบุ ขั้นตอนการแก้ไข (สำหรับงาน VO)');
          
          handleCreateDefect(formData);
        };

        const isFormValid = formData.mainCategory && formData.subCategory && formData.team && formData.targetStartDate && formData.description.trim() && (!isVO || formData.voSteps.trim());

                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.mainCategory} onChange={handleMainCatChange} required>
                      {mainCategories.length > 0 ? mainCategories.map(c => <option key={c} value={c}>{c}</option>) : <option value="">- ไม่มีข้อมูล -</option>}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">SUB CATEGORY *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.subCategory} onChange={e => setFormData({...formData, subCategory: e.target.value})} required>
                      {getSubsForCategory(formData.mainCategory).length > 0 ? (
                        getSubsForCategory(formData.mainCategory).map(c => <option key={c} value={c}>{c}</option>)
                      ) : (
                        <option value="" disabled>- ไม่พบข้อมูลหมวดหมู่รอง -</option>
                      )}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">TEAM *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.team} onChange={e => setFormData({...formData, team: e.target.value})} required>
                      {teams.length > 0 ? teams.map(t => <option key={t} value={t}>{t}</option>) : <option value="">- ไม่มีข้อมูลทีม -</option>}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">MAJOR ISSUE? *</label>
                    <select className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2.5 px-3 border outline-none" value={formData.major} onChange={e => setFormData({...formData, major: e.target.value})} required>
                      <option value="ไม่ใช่">ไม่ใช่</option>
                      <option value="ใช่">ใช่</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">วันเข้าแก้ไข *</label>
                    <input type="date" className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-2 px-3 border outline-none" value={formData.targetStartDate} onChange={handleDateChange} required />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">วันแก้ไขเสร็จสิ้น *</label>

                  </div>
                </div>
                
                <div>
                  <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">DESCRIPTION *</label>
                  <textarea className="block w-full rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 text-sm py-3 px-3 border outline-none" rows="4" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} required></textarea>

                {/* Upload Area */}

                   <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">UPLOAD INITIAL PHOTO (OPTIONAL)</label>
                   <div className="flex items-center gap-4">
                      {formData.imgBefore ? (
                         <div className="relative w-full h-40 md:h-48 border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                            <img src={formData.imgBefore} alt="Preview" className="w-full h-full object-cover" />

                               <Icons.Trash className="w-4 h-4" />
                            </button>
                         </div>
                      ) : (
                        <div className="relative w-full h-40 md:h-48 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-400 bg-white hover:bg-brand-50 hover:border-brand-300 transition-colors cursor-pointer" onClick={() => document.getElementById('add-defect-img').click()}>
                          <Icons.File className="w-8 h-8 mb-2 opacity-50" />

                          <input id="add-defect-img" type="file" accept="image/*" className="hidden" onChange={(e) => {
                               const file = e.target.files[0];
                               if (file) { const reader = new FileReader(); reader.onloadend = () => setFormData(prev => ({...prev, imgBefore: reader.result})); reader.readAsDataURL(file); }
                               e.target.value = null; // Reset input
                            }} />
                        </div>
                      )}
                   </div>
                </div>
                
                {isVO && (
                  <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 mt-2">
                    <label className="block text-xs font-bold text-purple-800 uppercase tracking-wide mb-1.5">ขั้นตอนการแก้ไข (เฉพาะงาน VO) *</label>
                    <textarea className="block w-full rounded-md border-purple-200 shadow-sm focus:border-purple-500 focus:ring-purple-500 text-sm py-2 px-3 border outline-none" rows="2" placeholder="ระบุขั้นตอนการทำงานเพื่อประเมิน BOQ..." value={formData.voSteps} onChange={e => setFormData({...formData, voSteps: e.target.value})} required></textarea>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="px-6 py-4 border-t border-gray-100 flex justify-end items-center gap-4 shrink-0 bg-gray-50/50 rounded-b-2xl">
                <button onClick={() => setShowDefectForm(false)} className="text-sm font-bold text-gray-600 hover:text-gray-900 transition-colors">Cancel</button>
                <button 
                  onClick={handleSave} 
                  disabled={isSaving || !isFormValid} 
                  className={`px-6 py-2.5 rounded-lg text-sm font-bold text-white transition-all ${(isSaving || !isFormValid) ? 'bg-gray-400 opacity-70 cursor-not-allowed' : 'bg-brand-500 hover:bg-brand-600 shadow-md shadow-brand-200 hover:-translate-y-0.5'}`}>
                  {isSaving ? 'Saving...' : 'Save Defect'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // --- Main Views ---
      const Sidebar = ({ onLogout, isOpen, onToggle }) => (
        <React.Fragment>
          {/* Mobile Overlay */}
          {isOpen && (
            <div className="lg:hidden fixed inset-0 bg-gray-900/60 z-[50] backdrop-blur-sm transition-opacity" onClick={onToggle}></div>
          )}
          
          <aside className={`fixed lg:static top-0 left-0 h-screen bg-gradient-to-b from-brand-800 to-brand-950 text-white flex flex-col transition-all duration-300 z-[60] shadow-2xl lg:shadow-xl flex-shrink-0 overflow-hidden ${
            isOpen ? 'w-64 translate-x-0' : 'w-0 -translate-x-full lg:-translate-x-full'
          }`}>
            <div className="w-64 flex flex-col h-full">
              <div className="h-20 flex items-center px-6 border-b border-white/10 shrink-0">
                <Icons.Logo />
                <span className="ml-3 font-bold text-xl tracking-tight">Upstream</span>
              </div>
              <nav className="flex-1 py-6 flex flex-col gap-2 px-3">
                {[
                  ...(!isSupplier || isAdmin || isStaff ? [{ icon: Icons.Grid, label: 'Dashboard', targetView: 'DASHBOARD', active: view === 'DASHBOARD' }] : []),
                  ...((isSupplier && !isAdmin && !isStaff) ? [{ icon: Icons.Calendar, label: 'My Defects', targetView: 'SUPPLIER_DEFECTS', active: view === 'SUPPLIER_DEFECTS' || view === 'DEFECT_DETAIL' }] : [{ icon: Icons.Building, label: 'Project', targetView: 'JOB_LIST', active: view === 'JOB_LIST' }]),
                  ...(!isSupplier || isAdmin || isStaff ? [{ icon: Icons.Calendar, label: 'Tasks & Defects', targetView: null, active: view === 'JOB_DETAIL' || view === 'TASK_DETAIL' || view === 'DEFECT_DETAIL' }] : []),
                  ...(canManageUsers ? [{ icon: Icons.User, label: 'User Management', targetView: 'USER_MANAGEMENT', active: view === 'USER_MANAGEMENT' }] : []),
                  ...(!isAdmin ? [{ icon: Icons.Settings, label: 'My Profile', targetView: 'PROFILE_SETTINGS', active: view === 'PROFILE_SETTINGS' }] : []),
                ].map((item, idx) => {
                  const IconComp = item.icon;

                  <button key={idx} onClick={() => { if(item.targetView) setView(item.targetView); if(window.innerWidth < 1024) onToggle(); }} 
                    className={`flex items-center p-3 rounded-xl transition-all ${item.active ? 'bg-white/20 text-white shadow-inner' : 'text-brand-100 hover:bg-white/10 hover:text-white'}`}>
                    <div className={`${item.active ? 'text-brand-300' : ''}`}><IconComp /></div>
                    <span className="ml-4 font-medium">{item.label}</span>

              </nav>
              <div className="p-4 border-t border-white/10 flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-xl transition-colors m-3" onClick={onLogout}>
                 <Avatar name={currentUser?.fullName} />

                    <div className="text-xs text-brand-200 truncate">Sign Out</div>
                 </div>
              </div>

          </aside>
        </React.Fragment>

          <header className={`h-16 md:h-20 backdrop-blur-md border-b flex items-center justify-between px-4 md:px-6 z-20 shrink-0 transition-colors duration-300 sticky top-0 ${isDefect ? 'bg-[#0D504C] border-transparent' : 'bg-white/90 border-gray-100'}`}>
            <div className="flex items-center flex-1 max-w-xl gap-2 md:gap-4">
              <button onClick={onToggleSidebar} className={`p-2 rounded-xl transition-colors focus:outline-none ${isDefect ? 'text-white hover:bg-white/10' : 'text-gray-500 hover:text-brand-600 hover:bg-brand-50'}`} title="เปิด/ปิด เมนู">
                <Icons.Menu className="w-6 h-6" />
              </button>
              
              {!isDefect && (
                <div className="flex-1 flex items-center bg-gray-50 rounded-full px-3 md:px-4 py-2 md:py-2.5 border border-gray-200 focus-within:border-brand-400 focus:ring-2 focus:ring-brand-100 transition-all w-full">
                  <span className="text-gray-400"><Icons.Search className="w-4 h-4 md:w-5 md:h-5"/></span>
                  <input type="text" placeholder="Search projects, tasks..." className="bg-transparent border-none outline-none w-full ml-2 md:ml-3 text-sm placeholder-gray-400 text-gray-800" />

              <button className={`relative p-2 rounded-full transition-colors hidden sm:block ${isDefect ? 'text-white hover:bg-white/10' : 'text-gray-400 hover:text-brand-600 hover:bg-brand-50'}`}>

              </button>

          {tabs.map(tab => (
            <button key={tab} className={`pb-4 text-sm font-semibold whitespace-nowrap transition-all border-b-2 ${activeTab === tab ? 'border-brand-500 text-brand-700' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>{tab}</button>

      const DashboardView = () => {
        const summaryCards = [
          { label: 'Projects ทั้งหมด', value: jobs.length, accent: 'from-sky-500 to-cyan-500', helper: `${activeProjectsCount} Active / ${closedProjectsCount} Closed` },
          { label: 'Tasks ทั้งหมด', value: allTasks.length, accent: 'from-violet-500 to-purple-500', helper: `${pendingTasksCount} Pending / ${activeTasksCount} Active` },
          { label: 'Defects ทั้งหมด', value: allDefects.length, accent: 'from-amber-500 to-orange-500', helper: `${pendingDefectsCount} รอดำเนินการ / ${completedDefectsCount} แก้แล้ว` },
          { label: 'Major Issues', value: majorDefectsCount, accent: 'from-rose-500 to-red-500', helper: 'รายการที่ต้องติดตามใกล้ชิด' }
        ];

        return (
